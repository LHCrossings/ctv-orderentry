name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deploy is authorized
        # Tripwire: fail loudly if anyone other than an allowed actor triggers a
        # deploy. Runs first, before any secrets (Tailscale / SSH key) are used.
        # Configure the allowlist via the DEPLOY_ALLOWED_ACTORS repo variable
        # (comma- or space-separated logins); defaults to the repo owner.
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED: ${{ vars.DEPLOY_ALLOWED_ACTORS }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          allowed="${ALLOWED:-$OWNER}"
          allowed="${allowed//,/ }"
          for a in $allowed; do
            if [ "$a" = "$ACTOR" ]; then
              echo "✓ Deploy authorized for actor '$ACTOR'."
              exit 0
            fi
          done
          echo "::error title=Unauthorized deploy::Triggered by '$ACTOR'; allowed: $allowed"
          exit 1

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          # Pinned (not 'latest'): resolving 'latest' queries pkgs.tailscale.com
          # on EVERY run, so a package-server outage fails the whole deploy
          # (2026-07-16, two deploys lost). With a pinned version the action's
          # cache serves the binary and pkgs is only needed once per version
          # bump. 1.98.8 = the version our own machines run.
          version: 1.98.8
          use-cache: 'true'
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # Wait until deploy host is reachable on tailnet.
          ping: ${{ vars.DEPLOY_HOST }}

      - uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euxo pipefail
            # The checkout is owned by a different user than DEPLOY_USER, so Git's
            # safe.directory guard blocks git commands. Allow this path (idempotent).
            git config --global --add safe.directory /opt/ctv-orderentry
            cd /opt/ctv-orderentry
            git fetch origin
            git checkout "${{ github.ref_name }}"
            # This checkout is a deploy target and must mirror origin exactly.
            # If commits were made directly on the server (e.g. a live hotfix),
            # --ff-only would refuse forever. Preserve them on a timestamped
            # branch, show them in the run log, then reset to origin.
            if [ "$(git rev-list --count "origin/${{ github.ref_name }}..HEAD")" -gt 0 ]; then
              backup="server-local/$(date +%Y%m%d-%H%M%S)"
              echo "::warning title=Local commits on deploy host::preserved on branch $backup"
              git log --stat "origin/${{ github.ref_name }}..HEAD"
              git branch "$backup"
              git reset --hard "origin/${{ github.ref_name }}"
            fi
            git pull --ff-only origin "${{ github.ref_name }}"
            docker compose build control-room
            # up can fail with a name conflict if a previous recreate was
            # interrupted and left a renamed container (e.g. <id>_ctv-control-room)
            # holding the fixed container_name. Self-heal: remove anything
            # matching the name and retry once.
            docker compose up -d control-room || {
              echo "compose up failed — removing stale ctv-control-room containers and retrying"
              docker ps -aq --filter "name=ctv-control-room" | xargs -r docker rm -f
              docker compose up -d control-room
            }
