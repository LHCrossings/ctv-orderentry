# CTV Order Entry — Control Room (production-oriented)
#
# Network access (Tailscale on the host — option A):
#   1. Install Tailscale on the Linux host and join your tailnet.
#   2. Bind the app to localhost only on the host, OR publish only on the
#      Tailscale interface (see comments below).
#   3. Users reach: http://<host-magicdns-name>:4000
#      MagicDNS supplies the hostname; you still choose the port (4000 here).
#
# Blocking IPs:
#   - Tailscale ACLs control which tailnet identities can reach the host/port.
#   - To block specific public IPs, do NOT expose port 4000 on 0.0.0.0; use
#     host firewall (ufw/nftables) or bind to 127.0.0.1 + Tailscale IP only.
#   - This compose file publishes 4000 on all interfaces by default; tighten
#     on the host if you need stricter IP allowlists.

services:
  control-room:
    build: .
    container_name: ctv-control-room
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
    volumes:
      - ./incoming:/app/incoming
      - ./processed:/app/processed
      - ./errors:/app/errors
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - /mnt/k-drive:/mnt/k
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
