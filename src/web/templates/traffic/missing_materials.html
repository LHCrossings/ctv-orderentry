<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Missing Materials — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
    <style>
        main { max-width: 900px; }

        .tool-card {
            background: var(--nord6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 1px 4px var(--shadow-color);
        }

        .tool-card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .tool-card > p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .field-group { display: flex; flex-direction: column; gap: 5px; }
        .field-group.date { flex: 0 0 150px; }

        .field-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .field-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .field-input:focus {
            border-color: var(--nord10);
            box-shadow: 0 0 0 3px rgba(94,129,172,0.15);
        }

        .run-btn {
            padding: 9px 22px;
            background: var(--nord10);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
            height: 38px;
        }

        .run-btn:hover:not(:disabled) { background: var(--nord9); transform: translateY(-1px); }
        .run-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .summary-bar {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .summary-bar strong { color: var(--nord11); }

        /* Market sections */
        .market-section { margin-bottom: 28px; }

        .market-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .market-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: white;
            background: var(--nord10);
            padding: 3px 10px;
            border-radius: 4px;
        }

        .market-count {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.83rem;
        }

        .data-table th {
            text-align: left;
            padding: 7px 10px;
            font-size: 0.70rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: middle;
        }

        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--bg-secondary); }

        .col-date  { width: 90px; white-space: nowrap; }
        .col-time  { width: 90px; white-space: nowrap; color: var(--text-muted); }
        .col-code  { width: 180px; font-family: monospace; font-size: 0.80rem; color: var(--text-muted); }
        .col-name  { }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 40px 0;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 40px 0;
        }

        .alert-err {
            background: rgba(191,97,106,0.1);
            border: 1px solid rgba(191,97,106,0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--nord11);
            font-size: 0.85rem;
            margin-top: 12px;
        }

        #resultsArea { display: none; }
        #resultsArea.visible { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/" class="back-link">🏠</a>
            <div class="logo-icon">⚠️</div>
            <div>
                <h1>Missing <span>Materials</span></h1>
                <div class="logo-sub">Traffic · Control Room</div>
            </div>
        </div>
        <span class="header-badge">CTV · Internal</span>
    </div>
</header>

<main>
    <div class="tool-card">
        <h2>Spots Scheduled Without a Commercial</h2>
        <p>Scans all markets for spots in the schedule that have no material assigned. These will air black if not resolved before airtime.</p>

        <div class="input-row">
            <div class="field-group date">
                <label class="field-label" for="dateFrom">From Date</label>
                <input id="dateFrom" class="field-input" type="text" placeholder="MM/DD/YYYY" onblur="formatDate(this)" />
            </div>
            <div class="field-group date">
                <label class="field-label" for="dateTo">To Date</label>
                <input id="dateTo" class="field-input" type="text" placeholder="MM/DD/YYYY" onblur="formatDate(this)" />
            </div>
            <button id="runBtn" class="run-btn" onclick="loadMissing()">&#9654; Run</button>
        </div>

        <div id="errorArea"></div>
        <div id="loadingArea" class="loading" style="display:none">Scanning schedule...</div>

        <div id="resultsArea">
            <div class="summary-bar" id="summaryBar"></div>
            <div id="marketsContainer"></div>
        </div>
    </div>
</main>

<script>
function toMMDDYYYY(d) {
    return String(d.getMonth()+1).padStart(2,'0') + '/' +
           String(d.getDate()).padStart(2,'0') + '/' + d.getFullYear();
}

window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const next6 = new Date(today); next6.setDate(today.getDate() + 6);
    document.getElementById('dateFrom').value = toMMDDYYYY(today);
    document.getElementById('dateTo').value   = toMMDDYYYY(next6);
});

function formatDate(el) {
    const d = el.value.replace(/\D/g, '');
    const yr = new Date().getFullYear();
    if (d.length === 3)      el.value = '0'+d[0]+'/'+d.slice(1,3)+'/'+yr;
    else if (d.length === 4) el.value = d.slice(0,2)+'/'+d.slice(2,4)+'/'+yr;
    else if (d.length === 6) el.value = d.slice(0,2)+'/'+d.slice(2,4)+'/20'+d.slice(4,6);
    else if (d.length === 8) el.value = d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4,8);
}

async function loadMissing() {
    const dateFrom = document.getElementById('dateFrom').value.trim();
    const dateTo   = document.getElementById('dateTo').value.trim();
    if (!dateFrom || !dateTo) {
        document.getElementById(dateFrom ? 'dateTo' : 'dateFrom').focus();
        return;
    }

    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('resultsArea').classList.remove('visible');
    document.getElementById('loadingArea').style.display = 'block';
    document.getElementById('runBtn').disabled = true;

    try {
        const params = new URLSearchParams({ date_from: dateFrom, date_to: dateTo });
        const resp = await fetch('/api/traffic/missing-materials?' + params);
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        render(data.rows || []);
        document.getElementById('resultsArea').classList.add('visible');
    } catch(e) {
        document.getElementById('errorArea').innerHTML =
            `<div class="alert-err">Error: ${escHtml(e.message)}</div>`;
    } finally {
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('runBtn').disabled = false;
    }
}

function render(rows) {
    const container = document.getElementById('marketsContainer');
    container.innerHTML = '';

    if (!rows.length) {
        document.getElementById('summaryBar').innerHTML = 'No missing materials in this date range.';
        container.innerHTML = '<div class="empty-state">All scheduled spots have materials assigned.</div>';
        return;
    }

    document.getElementById('summaryBar').innerHTML =
        `<strong>${rows.length}</strong> spot${rows.length !== 1 ? 's' : ''} without material across ${new Set(rows.map(r => r.market)).size} market${new Set(rows.map(r => r.market)).size !== 1 ? 's' : ''}`;

    // Group by market (already sorted by market_order, date, time from server)
    const byMarket = [];
    let current = null;
    for (const r of rows) {
        if (!current || current.market !== r.market) {
            current = { market: r.market, rows: [] };
            byMarket.push(current);
        }
        current.rows.push(r);
    }

    for (const group of byMarket) {
        const section = document.createElement('div');
        section.className = 'market-section';
        section.innerHTML = `
            <div class="market-heading">
                <span class="market-label">${escHtml(group.market)}</span>
                <span class="market-count">${group.rows.length} spot${group.rows.length !== 1 ? 's' : ''}</span>
            </div>
            <div style="overflow-x:auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-date">Date</th>
                            <th class="col-time">Time</th>
                            <th class="col-code">Contract</th>
                            <th>Name</th>
                        </tr>
                    </thead>
                    <tbody>${group.rows.map(r => `
                        <tr>
                            <td class="col-date">${escHtml(r.date)}</td>
                            <td class="col-time">${escHtml(r.time)}</td>
                            <td class="col-code">${escHtml(r.contract_code)}</td>
                            <td>${escHtml(r.contract_name)}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>`;
        container.appendChild(section);
    }
}

function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
