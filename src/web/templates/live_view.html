<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live View — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--nord0);
            color: var(--nord4);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--nord1);
            border-bottom: 1px solid var(--nord2);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-link,
        .back-link:visited {
            color: var(--nord6);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 5px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            opacity: 0.85;
            transition: opacity 0.15s, background 0.15s;
            letter-spacing: 0.03em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .back-link:hover { opacity: 1; background: rgba(255,255,255,0.14); }
        .back-link::after { content: "home"; font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }

        h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--nord6);
            letter-spacing: 0.02em;
        }

        .current-network {
            font-size: 0.8rem;
            color: var(--nord3);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 24px 20px;
            gap: 14px;
        }

        /* Pills */
        .network-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--nord3);
            background: var(--nord1);
            color: var(--nord4);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .pill:hover {
            border-color: var(--nord8);
            color: var(--nord8);
        }
        .pill.active {
            background: var(--nord10);
            border-color: var(--nord10);
            color: var(--nord6);
        }

        /* Player */
        .player-wrapper {
            flex: 1;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            max-height: calc(100vh - 180px);
        }

        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(46, 52, 64, 0.85);
            color: var(--nord4);
            font-size: 0.9rem;
            gap: 8px;
        }
        .player-overlay.hidden { display: none; }
        .overlay-icon { font-size: 2rem; opacity: 0.4; }

        /* Status bar */
        .stream-status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--nord3);
            height: 20px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--nord14);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }
        .status-dot.idle    { background: var(--nord3); animation: none; }
        .status-dot.error   { background: var(--nord11); animation: none; }
        .status-dot.loading { background: var(--nord13); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

        .status-network {
            color: var(--nord6);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .status-divider { color: var(--nord2); }
        .status-text { color: var(--nord3); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="/" class="back-link">🏠</a>
        <h1>Live View</h1>
    </div>
    <span class="current-network" id="header-network">—</span>
</header>

<main>

    <div class="network-pills" id="pill-row"></div>

    <div class="player-wrapper">
        <video id="player" controls playsinline></video>
        <div class="player-overlay" id="overlay">
            <span class="overlay-icon">📺</span>
            <span>Select a network above</span>
        </div>
    </div>

    <div class="stream-status-bar">
        <div class="status-dot idle" id="status-dot"></div>
        <span class="status-network" id="status-network">—</span>
        <span class="status-divider">·</span>
        <span class="status-text" id="status-text">No stream selected</span>
    </div>

</main>

<script>
const NETWORKS = [
    { label: 'NYC',     url: 'https://44.235.103.12/hls/93d39b6e-ff1e-3da8-9e01-2f632624cc69/play.m3u8' },
    { label: 'WDC',     url: 'https://44.235.103.12/hls/03fdaf37-9a36-7fa6-1f1a-ab691176f63e/play.m3u8' },
    { label: 'CMP',     url: 'https://44.235.103.12/hls/ac3337a0-ba65-4139-0b6d-8dd1a21f48d4/play.m3u8' },
    { label: 'HOU',     url: 'https://44.235.103.12/hls/cf1f814d-129f-3036-89ad-de8984f31f8a/play.m3u8' },
    { label: 'SEA',     url: 'https://44.235.103.12/hls/974aea18-1698-09df-997b-1b39f6ffc7c9/play.m3u8' },
    { label: 'SFO',     url: 'https://44.235.103.12/hls/a93c97b6-f649-edac-45c5-2316c165b436/play.m3u8' },
    { label: 'CVC',     url: 'https://44.235.103.12/hls/2322a035-e6c0-4230-95d7-62ca955a1600/play.m3u8' },
    { label: 'LAX',     url: 'https://44.235.103.12/hls/d872b727-e3be-3705-f41f-8c8e95c24f86/play.m3u8' },
    { label: 'DAL',     url: 'https://44.235.103.12/hls/dafad12b-935d-d871-0109-55b578a61ffa/play.m3u8' },
    { label: 'MMT',     url: 'https://44.235.103.12/hls/9a9fdf64-4de1-d4b6-8aab-f11b2725c1b2/play.m3u8' },
    { label: 'SFO OTA', url: 'https://44.235.103.12/hls/559317bc-6c56-8957-41ec-c812b2a4b21b/play.m3u8' },
    { label: 'CVC OTA', url: 'https://44.235.103.12/hls/d4f51ed7-7200-7e6a-b699-e29b1dfc4680/play.m3u8' },
];

const video         = document.getElementById('player');
const overlay       = document.getElementById('overlay');
const statusDot     = document.getElementById('status-dot');
const statusNetwork = document.getElementById('status-network');
const statusText    = document.getElementById('status-text');
const headerNetwork = document.getElementById('header-network');

let hls        = null;
let activePill = null;

function setStatus(state, text) {
    statusDot.className = `status-dot ${state}`;
    statusText.textContent = text;
}

function loadStream(network) {
    overlay.classList.add('hidden');
    statusNetwork.textContent = network.label;
    headerNetwork.textContent = network.label;
    setStatus('loading', 'Connecting…');

    if (hls) {
        hls.destroy();
        hls = null;
    }

    const url = network.url;

    if (Hls.isSupported()) {
        hls = new Hls({
            liveSyncDuration: 3,
            liveMaxLatencyDuration: 12,
            maxBufferLength: 30,
        });
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.muted = false;
            video.play().catch(() => {});
            setStatus('', 'Live');
        });

        hls.on(Hls.Events.ERROR, (_, data) => {
            if (data.fatal) {
                setStatus('error', 'Stream error — retrying…');
                setTimeout(() => {
                    if (hls) hls.startLoad();
                }, 3000);
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
            video.muted = false;
            video.play().catch(() => {});
            setStatus('', 'Live');
        }, { once: true });
        video.addEventListener('error', () => {
            setStatus('error', 'Stream error');
        }, { once: true });

    } else {
        overlay.classList.remove('hidden');
        overlay.innerHTML = '<span class="overlay-icon">⚠️</span><span>HLS not supported in this browser.</span>';
        setStatus('error', 'Unsupported browser');
    }
}

// Build pills
const pillRow = document.getElementById('pill-row');
NETWORKS.forEach(network => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.textContent = network.label;
    btn.addEventListener('click', () => {
        if (activePill) activePill.classList.remove('active');
        btn.classList.add('active');
        activePill = btn;
        loadStream(network);
    });
    pillRow.appendChild(btn);
});
</script>

</body>
</html>
