<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix Overscheduled Contract — CTV Control Room</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/static/css/_variables.css" />
  <link rel="stylesheet" href="/static/css/portal.css" />
  <style>
    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .search-wrap { position: relative; margin-bottom: 28px; }
    .search-wrap input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border-color); background: var(--bg-primary);
      color: var(--text-primary); font-size: 0.95rem; box-sizing: border-box;
      font-family: inherit;
    }
    .search-wrap input:focus { outline: none; border-color: var(--nord10); }
    .search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-primary); border: 1px solid var(--border-color);
      border-radius: 8px; z-index: 100; max-height: 260px; overflow-y: auto;
      display: none; box-shadow: 0 4px 12px var(--shadow-color);
    }
    .search-dropdown.open { display: block; }
    .search-option {
      padding: 9px 14px; cursor: pointer; font-size: 0.88rem;
      border-bottom: 1px solid var(--border-color); color: var(--text-primary);
    }
    .search-option:last-child { border-bottom: none; }
    .search-option:hover { background: var(--bg-secondary); }
    .search-option .code { font-weight: 600; color: var(--nord10); margin-right: 8px; }
    .search-option .dates { color: var(--text-secondary); font-size: 0.8rem; }

    .contract-banner {
      background: var(--bg-primary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 12px 16px; margin-bottom: 24px;
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    }
    .contract-banner .c-code { font-weight: 700; color: var(--nord10); font-size: 1rem; }
    .contract-banner .c-desc { color: var(--text-primary); font-size: 0.9rem; }
    .contract-banner .c-dates { color: var(--text-secondary); font-size: 0.82rem; margin-left: auto; }

    .section-label {
      font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      background: var(--bg-secondary); color: var(--text-secondary); font-weight: 600;
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-color);
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .market-badge {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      background: var(--nord9); font-size: 0.78rem; font-weight: 600; color: #fff;
    }
    .new-val { color: var(--accent-success); font-weight: 600; }
    .missed-val { color: var(--accent-danger); }

    .action-row { margin-top: 24px; display: flex; align-items: center; gap: 16px; }
    .btn-apply {
      background: var(--accent-primary); color: #fff; border: none;
      padding: 10px 28px; border-radius: 8px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-apply:hover { opacity: 0.9; }
    .btn-apply:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-msg { font-size: 0.88rem; }
    .empty-msg { color: var(--text-secondary); font-size: 0.88rem; padding: 20px 0; }
    #preview-section { display: none; }
  </style>
</head>
<body>

<header class="portal-header">
  <div class="header-inner">
    <div class="logo">
      <a href="/orders" class="back-link">🏠</a>
      <div class="logo-icon">✂️</div>
      <div class="logo-text">
        <div class="logo-name">Fix Overscheduled Contract</div>
        <div class="logo-sub">Orders</div>
      </div>
    </div>
  </div>
</header>

<main>
  <p style="color:var(--text-secondary); font-size:0.88rem; margin-bottom:24px; line-height:1.6;">
    Search for an overscheduled contract. The preview shows lines where spots went to blacklist
    (couldn't place). Applying will clear those blacklisted spots and update each line's ordered
    count to match what actually placed.
  </p>

  <div class="search-wrap">
    <input type="text" id="contractSearch" placeholder="Search by contract code or description…" autocomplete="off" />
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>

  <div id="preview-section">
    <div class="contract-banner" id="contractBanner"></div>

    <div class="section-label">Lines with trash spots</div>
    <div id="previewTableWrap"></div>

    <div class="action-row">
      <button class="btn-apply" id="applyBtn" disabled>Apply Fix</button>
      <span class="result-msg" id="resultMsg"></span>
    </div>
  </div>
</main>

<script>
const MARKETS = {1:'NYC',2:'CMP',3:'HOU',4:'SFO',5:'SEA',6:'LAX',7:'CVC',8:'WDC',9:'MMT',10:'DAL'};

let _selectedId  = null;
let _previewData = null;
let _searchTimer = null;

const searchInput   = document.getElementById('contractSearch');
const dropdown      = document.getElementById('searchDropdown');
const previewSection = document.getElementById('preview-section');
const contractBanner = document.getElementById('contractBanner');
const tableWrap     = document.getElementById('previewTableWrap');
const applyBtn      = document.getElementById('applyBtn');
const resultMsg     = document.getElementById('resultMsg');

searchInput.addEventListener('input', () => {
    clearTimeout(_searchTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { dropdown.classList.remove('open'); return; }
    _searchTimer = setTimeout(() => doSearch(q), 280);
});

document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

async function doSearch(q) {
    const resp = await fetch(`/api/orders/fix-overscheduled/search?q=${encodeURIComponent(q)}`);
    if (!resp.ok) return;
    const results = await resp.json();
    dropdown.innerHTML = '';
    if (!results.length) {
        dropdown.innerHTML = '<div class="search-option" style="color:var(--nord4)">No contracts found</div>';
    } else {
        results.forEach(r => {
            const el = document.createElement('div');
            el.className = 'search-option';
            el.innerHTML = `<span class="code">${escHtml(r.code)}</span>${escHtml(r.description || '')} <span class="dates">${r.date_start || ''} – ${r.date_end || ''}</span>`;
            el.addEventListener('click', () => selectContract(r));
            dropdown.appendChild(el);
        });
    }
    dropdown.classList.add('open');
}

async function selectContract(r) {
    _selectedId = r.id;
    searchInput.value = `${r.code} — ${r.description || ''}`;
    dropdown.classList.remove('open');

    previewSection.style.display = 'block';
    contractBanner.innerHTML = `<span class="c-code">${escHtml(r.code)}</span><span class="c-desc">${escHtml(r.description || '')}</span><span class="c-dates">${r.date_start || ''} – ${r.date_end || ''}</span>`;
    tableWrap.innerHTML = '<span style="color:var(--nord4);font-size:0.85rem;">Loading…</span>';
    applyBtn.disabled = true;
    resultMsg.textContent = '';

    await loadPreview(r.id);
}

async function loadPreview(contractId) {
    try {
        const resp = await fetch(`/api/orders/fix-overscheduled/${contractId}/preview`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Error loading preview');
        _previewData = data;
        renderPreview(data);
    } catch (e) {
        tableWrap.innerHTML = `<span style="color:var(--nord11);font-size:0.85rem;">Error: ${escHtml(e.message)}</span>`;
    }
}

function renderPreview(data) {
    if (!data.lines.length) {
        tableWrap.innerHTML = '<p class="empty-msg">No lines with blacklisted spots found. Nothing to fix.</p>';
        applyBtn.disabled = true;
        return;
    }

    let html = `<table>
      <thead><tr>
        <th>Market</th>
        <th>Description</th>
        <th>Dates</th>
        <th class="num">Ordered</th>
        <th class="num">Placed</th>
        <th class="num">Missed</th>
        <th class="num">New Ordered</th>
      </tr></thead><tbody>`;

    for (const l of data.lines) {
        const market = MARKETS[l.market_id] || `MKT${l.market_id}`;
        html += `<tr>
          <td><span class="market-badge">${escHtml(market)}</span></td>
          <td>${escHtml(l.description || '—')}</td>
          <td style="font-size:0.8rem;color:var(--text-secondary)">${l.date_start || ''} – ${l.date_end || ''}</td>
          <td class="num">${l.ordered}</td>
          <td class="num">${l.placed}</td>
          <td class="num missed-val">${l.missed}</td>
          <td class="num new-val">${l.placed}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    tableWrap.innerHTML = html;
    applyBtn.disabled = false;
}

applyBtn.addEventListener('click', async () => {
    if (!_selectedId) return;
    const lines = _previewData?.lines?.length || 0;
    const totalMissed = (_previewData?.lines || []).reduce((s, l) => s + l.missed, 0);
    if (!confirm(`Clear ${totalMissed} missed spot(s) from blacklist and update ${lines} line(s)?\n\nThis cannot be undone.`)) return;

    applyBtn.disabled = true;
    applyBtn.textContent = 'Applying…';
    resultMsg.style.color = '';
    resultMsg.textContent = '';

    try {
        const resp = await fetch(`/api/orders/fix-overscheduled/${_selectedId}/apply`, { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Error');
        resultMsg.style.color = 'var(--nord14)';
        resultMsg.textContent = `✓ Cleared ${data.blacklist_rows_deleted} blacklist entry(s), updated ${data.lines_updated} line(s).`;
        // Reload preview to confirm clean state
        await loadPreview(_selectedId);
    } catch (e) {
        resultMsg.style.color = 'var(--nord11)';
        resultMsg.textContent = `Error: ${e.message}`;
        applyBtn.disabled = false;
    } finally {
        applyBtn.textContent = 'Apply Fix';
    }
});

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
