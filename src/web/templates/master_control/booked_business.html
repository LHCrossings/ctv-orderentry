<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booked Business — Master Control</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
    <style>
        .tool-card {
            background: var(--nord6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px var(--shadow-color);
            margin-bottom: 16px;
        }
        .bb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .bb-nav {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .bb-nav button {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 0.4rem 0.9rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }
        .bb-nav button:hover { border-color: var(--nord10); color: var(--nord10); }
        .bb-month {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 160px;
            text-align: center;
        }
        .bb-bounds {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            text-align: center;
        }
        .bb-tabs {
            display: flex;
            gap: 0.5rem;
        }
        .bb-tab {
            padding: 0.4rem 1.2rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
        }
        .bb-tab.active {
            background: var(--nord10);
            border-color: var(--nord10);
            color: #fff;
        }
        .bb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .bb-table th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bb-table th.num { text-align: right; }
        .bb-table td {
            padding: 0.45rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .bb-table td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
        }
        .ae-heading td {
            background: var(--nord5);
            color: var(--nord10);
            font-weight: 600;
            padding: 0.5rem 0.75rem;
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .ae-subtotal td {
            background: var(--nord5);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.88rem;
            border-top: 1px solid var(--border-color);
        }
        .grand-total td {
            background: var(--nord10);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            border-bottom: none;
        }
        .billing-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .badge-broadcast { background: rgba(94,129,172,0.2);  color: var(--nord9); }
        .badge-calendar  { background: rgba(163,190,140,0.2); color: var(--nord14); }
        .badge-unset     { background: rgba(235,203,139,0.2); color: var(--nord13); }
        .badge-trade     { background: rgba(191,97,106,0.15); color: var(--nord11); }
        .warn-icon { color: var(--nord13); margin-left: 0.3rem; }
        .trade-section-header td {
            background: var(--nord11);
            color: #fff;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.5rem 0.75rem;
            border-bottom: none;
        }
        .trade-total td {
            background: rgba(191,97,106,0.15);
            color: var(--nord11);
            font-weight: 700;
            font-size: 0.95rem;
            border-bottom: none;
        }
        .bb-empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .loading-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .unset-card {
            background: var(--nord6);
            border: 1px solid var(--nord13);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px var(--shadow-color);
            margin-bottom: 16px;
        }
        .unset-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .unset-card-title {
            font-weight: 600;
            color: var(--nord13);
            font-size: 0.95rem;
        }
        .unset-apply-btn {
            padding: 0.4rem 1.2rem;
            border-radius: 6px;
            border: none;
            background: var(--nord10);
            color: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
        }
        .unset-apply-btn:disabled { opacity: 0.5; cursor: default; }
        .unset-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .unset-table th {
            text-align: left;
            padding: 0.4rem 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .unset-table td {
            padding: 0.4rem 0.6rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .unset-table .radio-group {
            display: flex;
            gap: 0.75rem;
        }
        .unset-table .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .unset-result {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            display: none;
        }
        .unset-result.ok  { color: var(--nord14); }
        .unset-result.err { color: var(--nord11); }
        .mkt-pill {
            padding: 0.25rem 0.65rem;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.04em;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .mkt-pill.active {
            background: var(--nord10);
            border-color: var(--nord10);
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/" class="home-btn">🏠</a>
            <div class="logo-icon">💰</div>
            <div>
                <h1>Booked <span>Business</span></h1>
                <div class="logo-sub">Master Control</div>
            </div>
        </div>
        <span class="header-badge">CTV · Internal</span>
    </div>
</header>

<main>
    <div class="tool-card">
        <div class="bb-header">
            <div class="bb-nav">
                <button id="prev-btn">&#8592;</button>
                <div>
                    <div class="bb-month" id="month-label">—</div>
                    <div class="bb-bounds" id="bounds-label"></div>
                </div>
                <button id="next-btn">&#8594;</button>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                <div class="bb-tabs">
                    <button class="bb-tab" id="tab-net" onclick="setTab('net')">Net</button>
                    <button class="bb-tab" id="tab-gross" onclick="setTab('gross')">Gross</button>
                </div>
                <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;color:var(--text-muted);cursor:pointer;white-space:nowrap;">
                    <input type="checkbox" id="show-trade" onchange="load()" />
                    Show Trade?
                </label>
                <div id="market-pills" style="display:flex;gap:0.3rem;flex-wrap:wrap;"></div>
                <a href="/master-control/billing-type-fix"
                   style="font-size:0.8rem;color:var(--nord13);text-decoration:none;white-space:nowrap;"
                   title="Fix clients with unset billing type">🏷️ Fix Billing Types</a>
            </div>
        </div>
    </div>

    <div class="tool-card" style="padding: 0; overflow: hidden;">
        <div id="report-area">
            <div class="loading-msg">Loading…</div>
        </div>
    </div>

    <div id="unset-panel" style="display:none;">
        <div class="unset-card">
            <div class="unset-card-header">
                <div class="unset-card-title" id="unset-title">⚠ Unset Contracts This Month</div>
                <button class="unset-apply-btn" id="unset-apply-btn" onclick="applyUnsetFix()" disabled>Apply</button>
            </div>
            <table class="unset-table">
                <thead>
                    <tr>
                        <th>Contract</th>
                        <th>AE</th>
                        <th>Client</th>
                        <th>Set To</th>
                    </tr>
                </thead>
                <tbody id="unset-tbody"></tbody>
            </table>
            <div id="unset-result" class="unset-result"></div>
        </div>
    </div>
</main>

<script>
    let currentYear, currentMonth;
    let activeTab = 'net';
    let lastData = null;
    let selectedMarkets = new Set();

    function init() {
        const now = new Date();
        currentYear  = now.getFullYear();
        currentMonth = now.getMonth() + 1;
        setTab('net');
        load();
    }

    function setTab(tab) {
        activeTab = tab;
        document.getElementById('tab-net').classList.toggle('active', tab === 'net');
        document.getElementById('tab-gross').classList.toggle('active', tab === 'gross');
        if (lastData) render(lastData);
    }

    document.getElementById('prev-btn').onclick = () => {
        currentMonth--;
        if (currentMonth < 1) { currentMonth = 12; currentYear--; }
        load();
    };
    document.getElementById('next-btn').onclick = () => {
        currentMonth++;
        if (currentMonth > 12) { currentMonth = 1; currentYear++; }
        load();
    };

    function fmt(n) {
        return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function buildMarketPills(markets) {
        const container = document.getElementById('market-pills');
        // Initialise selectedMarkets to all on first load; preserve selection on month nav
        const isFirstLoad = selectedMarkets.size === 0;
        if (isFirstLoad) markets.forEach(m => selectedMarkets.add(m));
        // Remove pills for markets no longer present; add new ones
        const existing = new Set([...container.querySelectorAll('.mkt-pill')].map(p => p.dataset.mkt));
        markets.forEach(m => {
            if (!existing.has(m)) {
                const btn = document.createElement('button');
                btn.className = 'mkt-pill' + (selectedMarkets.has(m) ? ' active' : '');
                btn.dataset.mkt = m;
                btn.textContent = m;
                btn.onclick = () => {
                    selectedMarkets.has(m) ? selectedMarkets.delete(m) : selectedMarkets.add(m);
                    btn.classList.toggle('active', selectedMarkets.has(m));
                    if (lastData) render(lastData);
                };
                container.appendChild(btn);
            }
        });
        // Re-sync active state for existing pills
        container.querySelectorAll('.mkt-pill').forEach(p => {
            p.classList.toggle('active', selectedMarkets.has(p.dataset.mkt));
        });
    }

    async function load() {
        document.getElementById('report-area').innerHTML = '<div class="loading-msg">Loading…</div>';
        document.getElementById('month-label').textContent = '—';
        document.getElementById('bounds-label').textContent = '';
        try {
            const showTrade = document.getElementById('show-trade').checked;
            const res = await fetch(`/api/master-control/booked-business/load?year=${currentYear}&month=${currentMonth}&show_trade=${showTrade}`);
            if (!res.ok) throw new Error(await res.text());
            lastData = await res.json();
            document.getElementById('month-label').textContent = lastData.month_label;
            document.getElementById('bounds-label').textContent =
                `Broadcast: ${lastData.bcast_bounds}  ·  Calendar: ${lastData.cal_bounds}`;
            buildMarketPills(lastData.all_markets || []);
            render(lastData);
            loadUnsetContracts();
        } catch (e) {
            document.getElementById('report-area').innerHTML =
                `<div class="bb-empty">Error: ${e.message}</div>`;
        }
    }

    function render(data) {
        const col = activeTab;
        if (!data.ae_groups || data.ae_groups.length === 0) {
            document.getElementById('report-area').innerHTML =
                '<div class="bb-empty">No booked business found for this month.</div>';
            return;
        }

        // Filter clients by selected markets (show client if any of its markets are selected)
        const filterClients = clients => selectedMarkets.size === 0
            ? clients
            : clients.filter(c => !c.markets || c.markets.length === 0 || c.markets.some(m => selectedMarkets.has(m)));

        let html = `<table class="bb-table">
            <thead>
                <tr>
                    <th>Account Executive / Client</th>
                    <th>Billing</th>
                    <th class="num">${col === 'net' ? 'Net Revenue' : 'Gross Revenue'}</th>
                </tr>
            </thead>
            <tbody>`;

        let grandTotal = 0;
        for (const ae of data.ae_groups) {
            const visibleClients = filterClients(ae.clients);
            if (!visibleClients.length) continue;
            const aeTotal = visibleClients.reduce((s, c) => s + c[col], 0);
            grandTotal += aeTotal;
            html += `<tr class="ae-heading">
                <td colspan="2">${ae.ae}</td>
                <td class="num">${fmt(aeTotal)}</td>
            </tr>`;
            for (const c of visibleClients) {
                const badge = c.billing === 'Broadcast'
                    ? `<span class="billing-badge badge-broadcast">Broadcast</span>`
                    : c.billing === 'Calendar'
                    ? `<span class="billing-badge badge-calendar">Calendar</span>`
                    : `<span class="billing-badge badge-unset">⚠ Unset</span>`;
                const warn = c.unset ? `<span class="warn-icon" title="CENTROMEDIA not set — billing type unknown">⚠</span>` : '';
                html += `<tr>
                    <td>&nbsp;&nbsp;&nbsp;${c.client}${warn}</td>
                    <td>${badge}</td>
                    <td class="num">${fmt(c[col])}</td>
                </tr>`;
            }
            html += `<tr class="ae-subtotal">
                <td>&nbsp;&nbsp;&nbsp;${ae.ae} Total</td>
                <td></td>
                <td class="num">${fmt(aeTotal)}</td>
            </tr>`;
        }

        html += `<tr class="grand-total">
            <td>Grand Total</td>
            <td></td>
            <td class="num">${fmt(grandTotal)}</td>
        </tr>`;

        if (data.trade_groups && data.trade_groups.length > 0) {
            html += `<tr class="trade-section-header">
                <td colspan="3">TRADE</td>
            </tr>`;
            for (const ae of data.trade_groups) {
                html += `<tr class="ae-heading">
                    <td colspan="2">${ae.ae}</td>
                    <td class="num">${fmt(ae[col])}</td>
                </tr>`;
                for (const c of ae.clients) {
                    html += `<tr>
                        <td>&nbsp;&nbsp;&nbsp;${c.client}</td>
                        <td><span class="billing-badge badge-trade">Trade</span></td>
                        <td class="num">${fmt(c[col])}</td>
                    </tr>`;
                }
                html += `<tr class="ae-subtotal">
                    <td>&nbsp;&nbsp;&nbsp;${ae.ae} Total</td>
                    <td></td>
                    <td class="num">${fmt(ae[col])}</td>
                </tr>`;
            }
            html += `<tr class="trade-total">
                <td>Trade Total</td>
                <td></td>
                <td class="num">${fmt(data['trade_' + col])}</td>
            </tr>`;
        }

        html += '</tbody></table>';
        document.getElementById('report-area').innerHTML = html;
    }

    // ── Unset contract fix panel ──────────────────────────────────────────────
    let unsetContracts = [];
    let unsetChoices  = {};

    async function loadUnsetContracts() {
        try {
            const res = await fetch(`/api/master-control/booked-business/unset-contracts?year=${currentYear}&month=${currentMonth}`);
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            unsetContracts = data.contracts;
            unsetChoices   = {};
            for (const c of unsetContracts) unsetChoices[c.id] = null;
            renderUnset();
        } catch (e) {
            document.getElementById('unset-panel').style.display = 'none';
        }
    }

    function renderUnset() {
        const panel = document.getElementById('unset-panel');
        if (!unsetContracts.length) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        document.getElementById('unset-title').textContent =
            `⚠ ${unsetContracts.length} Unset Contract${unsetContracts.length !== 1 ? 's' : ''} This Month`;

        const tbody = document.getElementById('unset-tbody');
        tbody.innerHTML = unsetContracts.map(c => {
            const sel = unsetChoices[c.id];
            return `<tr>
                <td><strong>${esc(c.code)}</strong><br><span style="color:var(--text-muted);font-size:0.78rem;">${esc(c.description)}</span></td>
                <td>${esc(c.ae)}</td>
                <td>${esc(c.client)}</td>
                <td>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="uc_${c.id}" value="316"
                                ${sel === 316 ? 'checked' : ''}
                                onchange="pickUnset(${c.id}, 316)" />
                            <span style="color:var(--nord9)">Broadcast</span>
                        </label>
                        <label>
                            <input type="radio" name="uc_${c.id}" value="317"
                                ${sel === 317 ? 'checked' : ''}
                                onchange="pickUnset(${c.id}, 317)" />
                            <span style="color:var(--nord14)">Calendar</span>
                        </label>
                    </div>
                </td>
            </tr>`;
        }).join('');
        updateUnsetBtn();
    }

    function pickUnset(id, billing) {
        unsetChoices[id] = billing;
        updateUnsetBtn();
    }

    function updateUnsetBtn() {
        const pending = Object.values(unsetChoices).filter(v => v !== null).length;
        document.getElementById('unset-apply-btn').disabled = pending === 0;
    }

    async function applyUnsetFix() {
        const updates = unsetContracts
            .filter(c => unsetChoices[c.id] !== null)
            .map(c => ({ contract_id: c.id, billing: unsetChoices[c.id] }));
        if (!updates.length) return;

        const btn = document.getElementById('unset-apply-btn');
        btn.disabled = true;
        btn.textContent = 'Applying…';
        const resultEl = document.getElementById('unset-result');
        resultEl.style.display = 'none';

        try {
            const res = await fetch('/api/master-control/booked-business/set-contract-billing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ updates }),
            });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            resultEl.className = 'unset-result ok';
            resultEl.textContent = `Updated ${data.updated} contract${data.updated !== 1 ? 's' : ''}.`;
            resultEl.style.display = 'block';
            btn.textContent = 'Apply';
            // reload both the report and the unset list
            await Promise.all([load(), loadUnsetContracts()]);
        } catch (e) {
            resultEl.className = 'unset-result err';
            resultEl.textContent = `Error: ${e.message}`;
            resultEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Apply';
        }
    }

    init();
</script>
</body>
</html>
