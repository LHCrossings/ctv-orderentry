<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backfill Database — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
    <style>
        main { max-width: 720px; }

        .tool-card {
            background: var(--nord6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 1px 4px var(--shadow-color);
        }

        .tool-card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .tool-card > p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group.date { flex: 0 0 160px; }

        .field-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .field-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .field-input:focus {
            border-color: var(--nord10);
            box-shadow: 0 0 0 3px rgba(94,129,172,0.15);
        }

        .toggle-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: flex-end;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            padding-bottom: 10px;
        }

        .toggle-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--nord10);
        }

        .run-btn {
            padding: 10px 24px;
            background: var(--nord10);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
            height: 42px;
        }

        .run-btn:hover:not(:disabled) { background: var(--nord9); transform: translateY(-1px); }
        .run-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .terminal {
            background: var(--nord0);
            border: 1px solid var(--nord1);
            border-radius: 10px;
            padding: 16px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            min-height: 160px;
            max-height: 500px;
            overflow-y: auto;
            display: none;
        }

        .terminal.visible { display: block; }
        .t-line { color: var(--nord4); }
        .t-info  { color: var(--nord8); }
        .t-done  { color: var(--nord14); font-weight: 600; }
        .t-err   { color: var(--nord11); }
        .t-warn  { color: var(--nord13); }
        .t-cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--nord8);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/customers" class="back-link">&#8592;</a>
            <div class="logo-icon">🔁</div>
            <div>
                <h1>Backfill <span>Database</span></h1>
                <div class="logo-sub">Customer Database · Control Room</div>
            </div>
        </div>
        <span class="header-badge">CTV · Internal</span>
    </div>
</header>

<main>
    <div class="tool-card">
        <h2>Scan and Populate</h2>
        <p>Scans M:\Clients for order files modified on or after the given date and populates the billing database. Use Dry Run to preview without writing.</p>

        <div class="input-row">
            <div class="field-group date">
                <label class="field-label" for="sinceDate">Since Date</label>
                <input id="sinceDate" class="field-input" type="text" placeholder="MM/DD/YYYY" onblur="formatDate(this)" />
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="dryRun" />
                    Dry Run
                </label>
            </div>
            <button id="runBtn" class="run-btn" onclick="runBackfill()">&#9654; Run</button>
        </div>

        <div id="terminal" class="terminal"></div>
    </div>
</main>

<script>
function formatDate(el) {
    const d = el.value.replace(/\D/g, '');
    const yr = new Date().getFullYear();
    if (d.length === 3) {
        el.value = '0' + d.slice(0,1) + '/' + d.slice(1,3) + '/' + yr;
    } else if (d.length === 4) {
        el.value = d.slice(0,2) + '/' + d.slice(2,4) + '/' + yr;
    } else if (d.length === 6) {
        el.value = d.slice(0,2) + '/' + d.slice(2,4) + '/20' + d.slice(4,6);
    } else if (d.length === 8) {
        el.value = d.slice(0,2) + '/' + d.slice(2,4) + '/' + d.slice(4,8);
    }
}

function toISODate(mmddyyyy) {
    const parts = mmddyyyy.split('/');
    if (parts.length !== 3) return mmddyyyy;
    return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
}

function runBackfill() {
    const sinceFull = document.getElementById('sinceDate').value.trim();
    if (!sinceFull) {
        document.getElementById('sinceDate').focus();
        return;
    }
    const since = toISODate(sinceFull);
    const dryRun = document.getElementById('dryRun').checked ? '1' : '0';

    const terminal = document.getElementById('terminal');
    const runBtn   = document.getElementById('runBtn');

    terminal.innerHTML = '';
    terminal.classList.add('visible');
    runBtn.disabled = true;

    const cursor = document.createElement('span');
    cursor.className = 't-cursor';
    terminal.appendChild(cursor);

    const params = new URLSearchParams({ since, dry_run: dryRun });
    const evtSource = new EventSource(`/api/customers/backfill?${params}`);

    evtSource.onmessage = (e) => {
        const raw = e.data;
        if (terminal.contains(cursor)) terminal.removeChild(cursor);

        const div = document.createElement('div');

        if (raw.startsWith('[EXIT:')) {
            const code = parseInt(raw.match(/\d+/)[0]);
            div.className = code === 0 ? 't-done' : 't-err';
            div.textContent = code === 0 ? 'Completed successfully.' : `Exited with code ${code}.`;
            terminal.appendChild(div);
            evtSource.close();
            runBtn.disabled = false;
            terminal.scrollTop = terminal.scrollHeight;
            return;
        }

        if (raw.includes('[DONE]'))       div.className = 't-done';
        else if (raw.includes('[INFO]'))  div.className = 't-info';
        else if (raw.includes('[WARN]') || raw.includes('WARNING')) div.className = 't-warn';
        else if (raw.includes('[ERROR]') || raw.includes('Error'))  div.className = 't-err';
        else                              div.className = 't-line';

        div.textContent = raw;
        terminal.appendChild(div);
        terminal.appendChild(cursor);
        terminal.scrollTop = terminal.scrollHeight;
    };

    evtSource.onerror = () => {
        if (terminal.contains(cursor)) terminal.removeChild(cursor);
        const div = document.createElement('div');
        div.className = 't-err';
        div.textContent = 'Connection lost or server error.';
        terminal.appendChild(div);
        evtSource.close();
        runBtn.disabled = false;
    };
}
</script>

</body>
</html>
