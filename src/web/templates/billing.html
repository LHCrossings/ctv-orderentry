<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billing — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/" class="back-link">&#8592;</a>
            <div class="logo-icon">💰</div>
            <div>
                <h1>Billing <span>Tools</span></h1>
                <div class="logo-sub">Control Room</div>
            </div>
        </div>
        <span class="header-badge">CTV · Internal</span>
    </div>
</header>

<main>
    <div class="portal-intro">
        <h2>Billing</h2>
        <p>Select a billing tool to get started.</p>
    </div>

    <div class="module-grid">

        <!-- CO-OP INVOICING — ACTIVE -->
        <a href="/billing/coop-invoicing" class="module-card active">
            <div class="module-icon">🧾</div>
            <div class="module-body">
                <div class="module-name">Co-op Invoicing</div>
                <div class="module-desc">Update existing co-op invoice PDFs or build new ones from scripts for Crossings TV.</div>
            </div>
            <span class="module-badge live">Live</span>
        </a>

        <!-- CUSTOMER DATABASE — ACTIVE -->
        <a href="/customers" class="module-card active">
            <div class="module-icon">👥</div>
            <div class="module-body">
                <div class="module-name">Customer Database</div>
                <div class="module-desc">Browse and manage advertiser and agency records.</div>
            </div>
            <span class="module-badge live">Live</span>
        </a>

    </div>
</main>

</body>
</html>
