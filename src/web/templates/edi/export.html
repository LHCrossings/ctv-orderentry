<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDI Export — Control Room</title>
  <link rel="stylesheet" href="/static/css/_variables.css"/>
  <link rel="stylesheet" href="/static/css/portal.css"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    /* Tabs */
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .tab-btn {
      padding: 6px 18px; border: 1px solid var(--border-color); border-radius: 6px;
      background: white; cursor: pointer; font-family: inherit; font-size: .875rem;
      font-weight: 500; color: var(--text-secondary); transition: all .15s;
    }
    .tab-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .tab-btn:hover:not(.active) { border-color: var(--text-secondary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; }
    .btn {
      padding: .45rem .9rem; border-radius: 4px; font-size: .85rem; font-weight: 600;
      cursor: pointer; border: none; transition: background .15s, opacity .15s;
    }
    .btn-primary { background: var(--accent-primary); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary {
      background: var(--bg-secondary); color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .btn-secondary:hover { background: var(--border-color); }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
    .btn-danger { background: var(--accent-danger); color: #fff; }
    .btn-danger:hover { opacity: .88; }
    .btn:disabled { opacity: .45; cursor: default; }

    /* File cards */
    .file-list { display: flex; flex-direction: column; gap: 1rem; }
    .file-card {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 6px; overflow: hidden;
    }
    .file-card-header {
      display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-tertiary, var(--bg-secondary));
    }
    .file-card-header .inv-num {
      font-weight: 700; font-size: .95rem; color: var(--text-primary); min-width: 80px;
    }
    .file-card-header .filename {
      color: var(--text-secondary); font-size: .82rem; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-card-header .meta {
      color: var(--text-secondary); font-size: .82rem; white-space: nowrap;
    }
    .file-card-body { padding: .85rem 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: .6rem 1.2rem; }
    .file-card-footer {
      padding: .65rem 1rem; border-top: 1px solid var(--border-color);
      display: flex; align-items: center; gap: .6rem;
    }

    /* Form fields */
    .field-group { display: flex; flex-direction: column; gap: .2rem; }
    .field-group label { font-size: .75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
    .field-group input, .field-group select {
      padding: .35rem .6rem; border-radius: 4px; font-size: .85rem;
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border-color); transition: border-color .15s;
    }
    .field-group input:focus, .field-group select:focus {
      outline: none; border-color: var(--accent-primary);
    }
    .field-group input[readonly] { color: var(--text-secondary); cursor: default; }
    .field-comment { grid-column: 1 / -1; }
    .field-group input.field-error, .field-group select.field-error { border-color: var(--accent-danger) !important; }
    .field-group input.field-warn,  .field-group select.field-warn  { border-color: #d08770 !important; }
    .match-badge { font-size: .75rem; font-weight: 600; margin-left: auto; }
    .match-badge.ok   { color: #2d6a4f; }
    .match-badge.warn { color: #d08770; }
    .match-badge.err  { color: var(--accent-danger); }
    .char-counter { font-size: .7rem; color: var(--text-secondary); text-align: right; margin-top: 1px; }
    .char-counter.near { color: #d08770; }
    .char-counter.over { color: var(--accent-danger); font-weight: 700; }

    /* Template list */
    .tmpl-list { display: flex; flex-direction: column; gap: .6rem; max-width: 700px; }
    .tmpl-row {
      display: flex; align-items: center; gap: .75rem; padding: .65rem .9rem;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 5px;
    }
    .tmpl-name { font-weight: 600; flex: 1; color: var(--text-primary); font-size: .9rem; }
    .tmpl-meta { color: var(--text-secondary); font-size: .8rem; }

    /* Template editor */
    .tmpl-editor {
      max-width: 680px; background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 6px; padding: 1.2rem; margin-top: 1rem; display: none;
    }
    .tmpl-editor.open { display: block; }
    .tmpl-editor h3 { margin: 0 0 1rem; font-size: 1rem; color: var(--text-primary); }
    .tmpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem 1rem; }
    .tmpl-full { grid-column: 1 / -1; }
    .tmpl-editor .field-group label { color: var(--text-secondary); }

    /* JSON drop zone */
    .json-drop-zone {
      max-width: 700px; border: 2px dashed var(--border-color); border-radius: 6px;
      padding: 1.2rem; text-align: center; color: var(--text-secondary);
      font-size: .88rem; cursor: pointer; transition: border-color .15s, background .15s;
      margin-bottom: .9rem;
    }
    .json-drop-zone.drag-over { border-color: var(--accent-primary); background: var(--bg-secondary); }
    .json-drop-zone input[type=file] { display: none; }

    /* Empty state */
    .empty { color: var(--text-secondary); font-size: .9rem; padding: 2rem 0; text-align: center; }

    /* Status */
    .status { font-size: .82rem; color: var(--text-secondary); }
    .status.ok { color: #2d6a4f; }
    .status.err { color: var(--accent-danger); }
    .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin: 0 0 .25rem; }
  .page-header p  { color: var(--text-secondary); margin: 0; font-size: .9rem; }

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <a href="/" class="home-btn">🏠</a>
      <div class="logo-icon">🧾</div>
      <div>
        <h1>Control <span>Room</span></h1>
        <div class="logo-sub">EDI Export</div>
      </div>
    </div>
    <span class="header-badge">EDI Tools</span>
  </div>
</header>

<main style="max-width:900px; margin:0 auto; padding:24px 16px;">
  <div class="page-header">
    <p>Generate TVB EDI .txt files from Etere post-log CSVs for upload to TVInvoices.com</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="generate">Generate</button>
    <button class="tab-btn" data-tab="templates">Templates</button>
  </div>

  <!-- ── GENERATE TAB ─────────────────────────────────────────────────── -->
  <div id="tab-generate" class="tab-panel active">
    <div class="toolbar">
      <button class="btn btn-primary" id="btn-scan">Scan incoming/EDI</button>
      <button class="btn btn-primary" id="btn-gen-all" disabled>Generate All (.zip)</button>
      <span class="status" id="scan-status"></span>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- ── TEMPLATES TAB ────────────────────────────────────────────────── -->
  <div id="tab-templates" class="tab-panel">
    <div class="toolbar">
      <button class="btn btn-primary btn-sm" id="btn-new-tmpl">+ New Template</button>
    </div>
    <div class="json-drop-zone" id="json-drop-zone">
      <input type="file" id="json-file-input" accept=".json" multiple>
      Drop <strong>.json</strong> template files here to import, or <a href="#" id="json-browse-link">browse</a>
      <span id="json-drop-status"></span>
    </div>
    <div class="tmpl-list" id="tmpl-list"><div class="empty">Loading…</div></div>

    <!-- Editor panel -->
    <div class="tmpl-editor" id="tmpl-editor">
      <h3 id="editor-title">New Template</h3>
      <div class="tmpl-grid">
        <div class="field-group"><label>Template Name *</label><input id="te-name" placeholder="e.g. Davis Elen WA McD"/></div>
        <div class="field-group"><label>EDI Code *</label><input id="te-edi-code" placeholder="9912567"/></div>
        <div class="field-group"><label>Call Letters *</label><input id="te-call-letters" maxlength="4" placeholder="CROS"/></div>
        <div class="field-group"><label>Commission %</label><input id="te-commission" type="number" step="0.1" value="15"/></div>
        <div class="field-group"><label>Representative</label><input id="te-rep" placeholder="Charmaine Lane"/></div>
        <div class="field-group"><label>Salesperson</label><input id="te-sales" placeholder=""/></div>
        <div class="field-group"><label>Agency Name *</label><input id="te-agency-name" placeholder="Davis Elen"/></div>
        <div class="field-group"><label>Advertiser Name</label><input id="te-advertiser" placeholder=""/></div>
        <div class="field-group"><label>Product Name</label><input id="te-product" placeholder="QSR"/></div>
        <div class="field-group tmpl-full"><label>Agency Address (4 lines, comma-separated)</label>
          <input id="te-agency-addr" placeholder="856 Figueroa Street, 12th Floor, Los Angeles CA, 90017"/></div>
        <div class="field-group"><label>Agency Ad Code</label><input id="te-ad-code" placeholder="DCBU"/></div>
        <div class="field-group"><label>Agency Prod Code</label><input id="te-prod-code" placeholder="QSR"/></div>
        <div class="field-group"><label>Payee Name</label><input id="te-payee-name" value="Crossings TV"/></div>
        <div class="field-group tmpl-full"><label>Payee Address (4 lines, comma-separated)</label>
          <input id="te-payee-addr" value="Accounts Receivable, 901 H Street Ste 120 PMB 91, Sacramento CA, 95814"/></div>
        <div class="field-group tmpl-full" style="border-top:1px solid var(--border-color);padding-top:.8rem;margin-top:.4rem;">
          <label style="color:var(--accent-primary)">Auto-Match Settings</label>
        </div>
        <div class="field-group"><label>Etere Customer IDs (authoritative match — comma-separated)</label>
          <input id="te-cust-ids" placeholder="e.g. 122 or 68, 431"/></div>
        <div class="field-group"><label>Etere Agency ID (optional tie-breaker)</label>
          <input id="te-agency-id" placeholder="e.g. 121"/></div>
        <div class="field-group tmpl-full"><label>Advertiser Match (legacy fallback — exact text from PDF affidavit)</label>
          <input id="te-adv-match" placeholder="e.g. Southern CA Toyota Dealers Association"/></div>
        <div class="field-group"><label>Market Match (tie-breaker, e.g. CVC / SFO / SEA)</label>
          <input id="te-mkt-match" placeholder="e.g. CVC"/></div>
      </div>
      <div style="display:flex;gap:.6rem;margin-top:1rem;">
        <button class="btn btn-primary btn-sm" id="btn-save-tmpl">Save</button>
        <button class="btn btn-secondary btn-sm" id="btn-cancel-tmpl">Cancel</button>
        <button class="btn btn-danger btn-sm" id="btn-del-tmpl" style="margin-left:auto;display:none;">Delete</button>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let templates = [];
let fileItems = [];   // [{csv_filename, suggested_template, spot_count, gross_cents, ...invoice_info}]
let editingSlug = null;

// ── Validation helpers ─────────────────────────────────────────────────────
function attachCharCounter(input, maxLen) {
  const counter = document.createElement('span');
  counter.className = 'char-counter';
  input.parentNode.appendChild(counter);
  function update() {
    const n = input.value.length;
    counter.textContent = `${n} / ${maxLen}`;
    if (n > maxLen) {
      counter.className = 'char-counter over';
      input.classList.add('field-error'); input.classList.remove('field-warn');
      input.title = `Too long — max ${maxLen} characters`;
    } else if (n > Math.floor(maxLen * 0.85)) {
      counter.className = 'char-counter near';
      input.classList.remove('field-error'); input.classList.add('field-warn');
      input.title = '';
    } else {
      counter.className = 'char-counter';
      input.classList.remove('field-error', 'field-warn');
      input.title = '';
    }
  }
  input.addEventListener('input', update);
  update();
}

function attachFormatValidator(input, pattern, hint) {
  function update() {
    const val = input.value.trim();
    if (!val) { input.classList.remove('field-error'); input.title = ''; return; }
    if (!pattern.test(val)) {
      input.classList.add('field-error');
      input.title = hint;
    } else {
      input.classList.remove('field-error');
      input.title = '';
    }
  }
  input.addEventListener('input', update);
  update();
}

function attachCardValidation(card) {
  attachCharCounter(card.querySelector('.f-invoice-number'),   10);
  attachCharCounter(card.querySelector('.f-estimate-code'),    10);
  attachCharCounter(card.querySelector('.f-order-number'),     10);
  attachCharCounter(card.querySelector('.f-rep-order'),        10);
  attachCharCounter(card.querySelector('.f-advertiser-name'),  25);
  attachCharCounter(card.querySelector('.f-product-name'),     25);
  attachCharCounter(card.querySelector('.f-ad-code'),           8);
  attachCharCounter(card.querySelector('.f-prod-code'),         8);
  attachCharCounter(card.querySelector('.f-comment-top'),     130);
  attachCharCounter(card.querySelector('.f-comment-bottom'),  130);
  attachCharCounter(card.querySelector('.f-comment-bottom-2'),130);
  attachCharCounter(card.querySelector('.f-comment-bottom-3'),130);
  attachCharCounter(card.querySelector('.f-comment-bottom-4'),130);
  attachFormatValidator(card.querySelector('.f-invoice-date'),  /^\d{6}$/, 'Must be YYMMDD — 6 digits');
  attachFormatValidator(card.querySelector('.f-bcast-month'),   /^\d{4}$/, 'Must be YYMM — 4 digits');
}

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

// ── Templates ──────────────────────────────────────────────────────────────
async function loadTemplates() {
  const res = await fetch('/edi/export/templates');
  templates = await res.json();
  renderTemplateList();
  // Also refresh any open selectors in generate tab
  document.querySelectorAll('.tmpl-select').forEach(sel => refreshSelect(sel));
}

function renderTemplateList() {
  const el = document.getElementById('tmpl-list');
  if (!templates.length) { el.innerHTML = '<div class="empty">No templates yet. Click "+ New Template" to create one.</div>'; return; }
  el.innerHTML = templates.map(t => `
    <div class="tmpl-row">
      <span class="tmpl-name">${t.name}</span>
      <span class="tmpl-meta">${t.call_letters || ''} · ${t.agency_name || ''}</span>
      <button class="btn btn-secondary btn-sm" onclick="duplicateTemplate('${slug(t.name)}')">Duplicate</button>
      <button class="btn btn-secondary btn-sm" onclick="openEditor('${slug(t.name)}')">Edit</button>
    </div>`).join('');
}

function refreshSelect(sel) {
  const current = sel.value;
  sel.innerHTML = '<option value="">— select template —</option>' +
    templates.map(t => `<option value="${t.name}" ${t.name===current?'selected':''}>${t.name}</option>`).join('');
}

document.getElementById('btn-new-tmpl').addEventListener('click', () => openEditor(null));

function duplicateTemplate(srcSlug) {
  openEditor(srcSlug);           // populate all fields from source
  editingSlug = null;            // treat as new — save won't overwrite original
  document.getElementById('editor-title').textContent = 'New Template (Duplicate)';
  document.getElementById('te-name').value = '';
  document.getElementById('btn-del-tmpl').style.display = 'none';
  document.getElementById('te-name').focus();
}

function openEditor(editSlug) {
  editingSlug = editSlug;
  const ed = document.getElementById('tmpl-editor');
  const t  = editSlug ? templates.find(x => slug(x.name) === editSlug) : null;
  document.getElementById('editor-title').textContent = t ? `Edit: ${t.name}` : 'New Template';
  document.getElementById('te-name').value         = t?.name || '';
  document.getElementById('te-edi-code').value     = t?.edi_code || '';
  document.getElementById('te-call-letters').value = t?.call_letters || '';
  document.getElementById('te-commission').value   = t?.commission_pct ?? 15;
  document.getElementById('te-rep').value          = t?.representative || '';
  document.getElementById('te-sales').value        = t?.salesperson || '';
  document.getElementById('te-agency-name').value  = t?.agency_name || '';
  document.getElementById('te-advertiser').value   = t?.advertiser_name || '';
  document.getElementById('te-product').value      = t?.product_name || '';
  document.getElementById('te-agency-addr').value  = t ? (t.agency_address||[]).join(', ') : '';
  document.getElementById('te-ad-code').value      = t?.agency_ad_code || '';
  document.getElementById('te-prod-code').value    = t?.agency_prod_code || '';
  document.getElementById('te-payee-name').value   = t?.payee_name || 'Crossings TV';
  document.getElementById('te-payee-addr').value   = t ? (t.payee_address||[]).join(', ') : 'Accounts Receivable, 901 H Street Ste 120 PMB 91, Sacramento CA, 95814';
  document.getElementById('te-cust-ids').value     = (t?.etere_customer_ids || []).join(', ');
  document.getElementById('te-agency-id').value    = t?.etere_agency_id ?? '';
  document.getElementById('te-adv-match').value    = t?.advertiser_match || '';
  document.getElementById('te-mkt-match').value    = t?.market_match || '';
  document.getElementById('btn-del-tmpl').style.display = editSlug ? '' : 'none';
  ed.classList.add('open');
  ed.scrollIntoView({behavior:'smooth', block:'nearest'});
}

document.getElementById('btn-cancel-tmpl').addEventListener('click', () => {
  document.getElementById('tmpl-editor').classList.remove('open');
  editingSlug = null;
});

document.getElementById('btn-save-tmpl').addEventListener('click', async () => {
  const name = document.getElementById('te-name').value.trim();
  if (!name) { alert('Template name is required.'); return; }
  const addrSplit = s => s.split(',').map(x => x.trim()).filter(Boolean);
  // Merge over the existing template so keys the modal doesn't edit
  // (e.g. comment_top_by_market) survive a UI save.
  const existing = editingSlug ? (templates.find(x => slug(x.name) === editingSlug) || {}) : {};
  const data = {
    ...existing,
    name,
    edi_code:        document.getElementById('te-edi-code').value.trim(),
    call_letters:    document.getElementById('te-call-letters').value.trim(),
    commission_pct:  parseFloat(document.getElementById('te-commission').value) || 15,
    representative:  document.getElementById('te-rep').value.trim(),
    salesperson:     document.getElementById('te-sales').value.trim(),
    agency_name:     document.getElementById('te-agency-name').value.trim(),
    advertiser_name: document.getElementById('te-advertiser').value.trim(),
    product_name:    document.getElementById('te-product').value.trim(),
    agency_address:  addrSplit(document.getElementById('te-agency-addr').value),
    agency_ad_code:  document.getElementById('te-ad-code').value.trim(),
    agency_prod_code:document.getElementById('te-prod-code').value.trim(),
    payee_name:       document.getElementById('te-payee-name').value.trim(),
    payee_address:    addrSplit(document.getElementById('te-payee-addr').value),
    advertiser_match: document.getElementById('te-adv-match').value.trim(),
    market_match:     document.getElementById('te-mkt-match').value.trim(),
    etere_customer_ids: document.getElementById('te-cust-ids').value
      .split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)),
  };
  const agencyId = parseInt(document.getElementById('te-agency-id').value.trim(), 10);
  if (!isNaN(agencyId)) data.etere_agency_id = agencyId;
  await fetch('/edi/export/templates', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  document.getElementById('tmpl-editor').classList.remove('open');
  editingSlug = null;
  await loadTemplates();
});

document.getElementById('btn-del-tmpl').addEventListener('click', async () => {
  if (!editingSlug || !confirm('Delete this template?')) return;
  await fetch(`/edi/export/templates/${editingSlug}`, { method:'DELETE' });
  document.getElementById('tmpl-editor').classList.remove('open');
  editingSlug = null;
  await loadTemplates();
});

// ── JSON template import (drag & drop / browse) ───────────────────────────
async function importJsonFiles(files) {
  const status = document.getElementById('json-drop-status');
  let ok = 0, fail = 0;
  for (const file of files) {
    if (!file.name.endsWith('.json')) { fail++; continue; }
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.name) { fail++; continue; }
      const res = await fetch('/edi/export/templates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (res.ok) ok++; else fail++;
    } catch { fail++; }
  }
  status.textContent = ` — ${ok} imported${fail ? ', ' + fail + ' failed' : ''}`;
  status.style.color = fail ? 'var(--accent-danger)' : '#2d6a4f';
  if (ok) await loadTemplates();
}

const dropZone   = document.getElementById('json-drop-zone');
const fileInput  = document.getElementById('json-file-input');
document.getElementById('json-browse-link').addEventListener('click', e => { e.preventDefault(); fileInput.click(); });
fileInput.addEventListener('change', () => importJsonFiles([...fileInput.files]));
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  importJsonFiles([...e.dataTransfer.files]);
});

// ── Scan & file cards ──────────────────────────────────────────────────────
document.getElementById('btn-scan').addEventListener('click', async () => {
  setScanStatus('Scanning…');
  const res   = await fetch('/edi/export/scan');
  fileItems   = await res.json();
  setScanStatus(fileItems.length ? `${fileItems.length} file${fileItems.length>1?'s':''} found` : 'No CSV files found in incoming/EDI');
  renderFileList();
  document.getElementById('btn-gen-all').disabled = fileItems.length === 0;
});

function setScanStatus(msg) {
  document.getElementById('scan-status').textContent = msg;
}

function fmt_date(yymmdd) {
  if (!yymmdd || yymmdd.length < 6) return yymmdd || '—';
  return `${yymmdd.slice(2,4)}/${yymmdd.slice(4,6)}/20${yymmdd.slice(0,2)}`;
}

function fmt_dollars(cents) {
  return '$' + (cents/100).toLocaleString('en-US', {minimumFractionDigits:2});
}

function renderFileList() {
  const el = document.getElementById('file-list');
  if (!fileItems.length) { el.innerHTML = '<div class="empty">No files found.</div>'; return; }
  el.innerHTML = fileItems.map((item, idx) => {
    const gross = fmt_dollars(item.gross_cents || 0);
    const tmpl = templates.find(t => t.name === item.suggested_template) || {};
    const tmplOpts = '<option value="">— select —</option>' +
      templates.map(t => `<option value="${t.name}" ${t.name===item.suggested_template?'selected':''}>${t.name}</option>`).join('');
    const conf = item.match_confidence || (item.suggested_template ? 'fuzzy' : 'none');
    const custNote = item.etere_customer_name ? ` (${item.etere_customer_name})` : '';
    const matchBadge =
      conf === 'customer-id' ? `<span class="match-badge ok" title="${item.match_detail||''}">✓ matched by customer ID${custNote}</span>` :
      conf === 'fuzzy'       ? `<span class="match-badge warn" title="${item.match_detail||''}">⚠ fuzzy match — verify</span>` :
      conf === 'ambiguous'   ? `<span class="match-badge warn" title="Candidates: ${(item.match_candidates||[]).join(', ')}">⚠ pick template (${(item.match_candidates||[]).length} candidates)</span>` :
                               `<span class="match-badge err" title="${item.match_detail||''}">✗ no template match — pick one</span>`;
    const selWarn = conf === 'customer-id' ? '' : (conf === 'none' ? 'field-error' : 'field-warn');
    return `
    <div class="file-card" data-idx="${idx}">
      <div class="file-card-header">
        <span class="inv-num">${item.invoice_number || '—'}</span>
        <span class="filename">${item.csv_filename}</span>
        <span class="meta">${item.spot_count} spots · ${gross}</span>
        ${matchBadge}
      </div>
      <div class="file-card-body">
        <div class="field-group" style="grid-column:1/-1">
          <label>Template</label>
          <select class="tmpl-select ${selWarn}">
            ${tmplOpts}
          </select>
        </div>
        <div class="field-group">
          <label>Invoice Number</label>
          <input class="f-invoice-number" value="${item.invoice_number||''}"/>
        </div>
        <div class="field-group">
          <label>Invoice Date (YYMMDD)</label>
          <input class="f-invoice-date" value="${item.invoice_date||''}"/>
        </div>
        <div class="field-group">
          <label>Estimate Code</label>
          <input class="f-estimate-code" value="${item.estimate_code||''}"/>
        </div>
        <div class="field-group">
          <label>Order / Contract #</label>
          <input class="f-order-number" value="${item.order_number||''}"/>
        </div>
        <div class="field-group">
          <label>Broadcast Month (YYMM)</label>
          <input class="f-bcast-month" value="${item.broadcast_month||''}" readonly/>
        </div>
        <div class="field-group">
          <label>Start Date</label>
          <input class="f-bcast-start" value="${item.bcast_start||''}" readonly title="${fmt_date(item.bcast_start)}"/>
        </div>
        <div class="field-group">
          <label>End Date</label>
          <input class="f-bcast-end" value="${item.bcast_end||''}" readonly title="${fmt_date(item.bcast_end)}"/>
        </div>
        <div class="field-group field-comment">
          <label>Record 32 — Top Comment (Market, Main Comment, Estimate Details)</label>
          <input class="f-comment-top" value="${item.comment_top||tmpl.comment_top||''}" placeholder="e.g. SAN FRANCISCO"/>
        </div>
        <div class="field-group">
          <label>Advertiser Name (R31)</label>
          <input class="f-advertiser-name" value="${tmpl.advertiser_name||''}"/>
        </div>
        <div class="field-group">
          <label>Product Name (R31)</label>
          <input class="f-product-name" value="${item.product_name||tmpl.product_name||''}"/>
        </div>
        <div class="field-group">
          <label>Agency Ad Code (R31)</label>
          <input class="f-ad-code" value="${item.agency_ad_code||tmpl.agency_ad_code||''}"/>
        </div>
        <div class="field-group">
          <label>Agency Prod Code (R31)</label>
          <input class="f-prod-code" value="${item.agency_prod_code||tmpl.agency_prod_code||''}"/>
        </div>
        <div class="field-group">
          <label>Rep Order Number (R31, optional)</label>
          <input class="f-rep-order" value="${item.rep_order_number||''}"/>
        </div>
        <div class="field-group field-comment">
          <label>Record 33 — Comment Bottom 1</label>
          <input class="f-comment-bottom" value="${item.comment_bottom||''}" placeholder="e.g. Toyota_ 2026 April ACM TV"/>
        </div>
        <div class="field-group field-comment">
          <label>Record 33 — Comment Bottom 2 (optional)</label>
          <input class="f-comment-bottom-2" placeholder=""/>
        </div>
        <div class="field-group field-comment">
          <label>Record 33 — Comment Bottom 3 (optional)</label>
          <input class="f-comment-bottom-3" placeholder=""/>
        </div>
        <div class="field-group field-comment">
          <label>Record 33 — Comment Bottom 4 (optional)</label>
          <input class="f-comment-bottom-4" placeholder=""/>
        </div>
      </div>
      <div class="file-card-footer">
        <button class="btn btn-primary btn-sm btn-dl">Download .txt</button>
        <span class="status card-status"></span>
      </div>
    </div>`;
  }).join('');

  // Attach download handlers
  document.querySelectorAll('.btn-dl').forEach(btn => {
    btn.addEventListener('click', () => downloadOne(btn.closest('.file-card')));
  });

  // Auto-populate template fields when template selection changes
  document.querySelectorAll('.tmpl-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const card = sel.closest('.file-card');
      // An explicit user pick resolves the auto-match warning
      if (sel.value) sel.classList.remove('field-warn', 'field-error');
      const t = templates.find(x => x.name === sel.value) || {};
      card.querySelector('.f-advertiser-name').value = t.advertiser_name || '';
      card.querySelector('.f-product-name').value    = t.product_name    || '';
      card.querySelector('.f-ad-code').value         = t.agency_ad_code  || '';
      card.querySelector('.f-prod-code').value       = t.agency_prod_code|| '';
      card.querySelector('.f-comment-top').value     = t.comment_top     || '';
      // Re-run counters after programmatic fill
      card.querySelectorAll('input').forEach(i => i.dispatchEvent(new Event('input')));
    });
  });

  // Attach validation to every card
  document.querySelectorAll('.file-card').forEach(card => attachCardValidation(card));
}

function getCardPayload(card) {
  const idx  = parseInt(card.dataset.idx);
  const item = fileItems[idx];
  return {
    csv_filename:   item.csv_filename,
    template_name:  card.querySelector('.tmpl-select').value,
    invoice_fields: {
      invoice_number:  card.querySelector('.f-invoice-number').value,
      invoice_date:    card.querySelector('.f-invoice-date').value,
      estimate_code:   card.querySelector('.f-estimate-code').value,
      order_number:    card.querySelector('.f-order-number').value,
      broadcast_month: card.querySelector('.f-bcast-month').value,
      bcast_start:     card.querySelector('.f-bcast-start').value,
      bcast_end:       card.querySelector('.f-bcast-end').value,
      comment_top:     card.querySelector('.f-comment-top').value,
      advertiser_name: card.querySelector('.f-advertiser-name').value,
      product_name:    card.querySelector('.f-product-name').value,
      agency_ad_code:   card.querySelector('.f-ad-code').value,
      agency_prod_code: card.querySelector('.f-prod-code').value,
      rep_order_number: card.querySelector('.f-rep-order').value,
      comment_bottom:   card.querySelector('.f-comment-bottom').value,
      comment_bottom_2: card.querySelector('.f-comment-bottom-2').value,
      comment_bottom_3: card.querySelector('.f-comment-bottom-3').value,
      comment_bottom_4: card.querySelector('.f-comment-bottom-4').value,
    },
  };
}

async function downloadOne(card) {
  const payload = getCardPayload(card);
  const statusEl = card.querySelector('.card-status');
  if (!payload.template_name) { statusEl.textContent = 'Select a template first.'; statusEl.className='status err'; return; }
  if (card.querySelectorAll('input.field-error').length) { statusEl.textContent = 'Fix validation errors before downloading.'; statusEl.className='status err'; return; }
  statusEl.textContent = 'Generating…'; statusEl.className = 'status';
  const res = await fetch('/edi/export/generate', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
  });
  if (!res.ok) { statusEl.textContent = `Error: ${res.status}`; statusEl.className='status err'; return; }
  const blob = await res.blob();
  const cd   = res.headers.get('Content-Disposition') || '';
  const fn   = (cd.match(/filename="([^"]+)"/) || [])[1] || 'edi.txt';
  triggerDownload(blob, fn);
  statusEl.textContent = '✓ Downloaded'; statusEl.className = 'status ok';
}

document.getElementById('btn-gen-all').addEventListener('click', async () => {
  const cards   = [...document.querySelectorAll('.file-card')];
  const payloads = cards.map(c => getCardPayload(c)).filter(p => p.template_name);
  if (!payloads.length) { alert('Select a template for at least one file.'); return; }
  setScanStatus('Generating ZIP…');
  const res = await fetch('/edi/export/generate-batch', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payloads)
  });
  if (!res.ok) { setScanStatus('Error generating ZIP.'); return; }
  triggerDownload(await res.blob(), 'edi_export.zip');
  setScanStatus(`ZIP ready — ${payloads.length} file${payloads.length>1?'s':''}`);
});

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function slug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
}

// ── Template editor field validation ──────────────────────────────────────
attachCharCounter(document.getElementById('te-agency-name'), 25);
attachCharCounter(document.getElementById('te-advertiser'),  25);
attachCharCounter(document.getElementById('te-product'),     25);
attachCharCounter(document.getElementById('te-rep'),         25);
attachCharCounter(document.getElementById('te-sales'),       25);

// ── Init ───────────────────────────────────────────────────────────────────
loadTemplates();
</script>
