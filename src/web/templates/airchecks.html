<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airchecks — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }


        main { max-width: 1100px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

        /* Card */
        .card {
            background: var(--nord6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px var(--shadow-color);
        }
        .card-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 16px;
        }

        /* Form layout */
        .form-grid { display: flex; flex-direction: column; gap: 14px; }
        .field-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
        .field-group { display: flex; flex-direction: column; gap: 5px; }
        .field-group.grow { flex: 1; min-width: 160px; }
        .field-label {
            font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .field-input {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 7px 12px; font-size: 0.9rem;
            color: var(--text-primary); outline: none; font-family: inherit;
            transition: border-color 0.15s;
        }
        .field-input:focus { border-color: var(--nord10); }

        /* Network pills */
        .net-pills { display: flex; flex-wrap: wrap; gap: 6px; }
        .net-pill {
            padding: 4px 13px; border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent; color: var(--text-muted);
            font-family: inherit; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
            transition: all 0.15s;
        }
        .net-pill:hover:not(.active) { border-color: var(--nord10); color: var(--nord10); }
        .net-pill.active { background: var(--nord10); border-color: var(--nord10); color: var(--nord6); }

        /* When toggle */
        .when-toggle { display: flex; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; width: fit-content; }
        .toggle-btn {
            padding: 6px 18px; font-family: inherit; font-size: 0.85rem; font-weight: 500;
            border: none; background: transparent; color: var(--text-muted); cursor: pointer;
            transition: all 0.15s;
        }
        .toggle-btn.active { background: var(--nord10); color: var(--nord6); }

        /* Duration presets */
        .dur-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .preset-btn {
            padding: 5px 13px; border-radius: 6px; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-muted); font-family: inherit;
            font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .preset-btn:hover { border-color: var(--nord10); color: var(--nord10); }
        .preset-btn.active { background: var(--nord10); border-color: var(--nord10); color: var(--nord6); }
        .dur-sep { color: var(--text-muted); font-size: 0.8rem; }
        .dur-custom { display: flex; align-items: center; gap: 6px; }
        .dur-input {
            width: 72px; background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 5px 8px; font-size: 0.88rem; font-family: inherit;
            color: var(--text-primary); outline: none; text-align: center;
        }
        .dur-input:focus { border-color: var(--nord10); }
        .dur-unit { font-size: 0.8rem; color: var(--text-muted); }

        /* Submit */
        .submit-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
        .submit-btn {
            background: var(--nord10); color: var(--nord6); border: none;
            border-radius: 8px; padding: 9px 24px; font-family: inherit;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .submit-btn:hover { background: var(--nord9); }
        .submit-btn:disabled { opacity: 0.5; cursor: default; }
        .submit-msg { font-size: 0.82rem; }
        .submit-msg.ok  { color: var(--nord14); }
        .submit-msg.err { color: var(--nord11); }

        /* Connection status */
        .agent-status { font-size: 0.78rem; color: var(--nord4); display: flex; align-items: center; gap: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .dot.ok  { background: var(--nord14); }
        .dot.err { background: var(--nord11); }
        .dot.checking { background: var(--nord13); }

        /* Captures table */
        .captures-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
        }
        .refresh-btn {
            background: transparent; border: 1px solid var(--border-color);
            border-radius: 6px; padding: 4px 12px; font-family: inherit;
            font-size: 0.78rem; color: var(--text-muted); cursor: pointer;
        }
        .select-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .select-toolbar label { font-size: 0.82rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-delete-sel { background: rgba(191,97,106,0.1); border: 1px solid rgba(191,97,106,0.3); color: var(--nord11); border-radius: 6px; padding: 4px 14px; font-size: 0.82rem; font-family: inherit; cursor: pointer; }
        .btn-delete-sel:hover { background: rgba(191,97,106,0.2); }
        .btn-delete-sel:disabled { opacity: 0.4; cursor: default; }
        .cb-col { width: 28px; }
        .refresh-btn:hover { border-color: var(--nord10); color: var(--nord10); }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--bg-secondary); text-align: left;
            font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 7px 12px; border-bottom: 1px solid var(--border-color);
        }
        td { padding: 9px 12px; border-bottom: 1px solid var(--bg-secondary); font-size: 0.85rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(229,233,240,0.4); }

        /* Status badges */
        .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; }
        .badge-pending   { background: rgba(76,86,106,0.15);  color: var(--nord3); }
        .badge-scheduled { background: rgba(235,203,139,0.25); color: #8a7030; }
        .badge-recording { background: rgba(208,135,112,0.2);  color: var(--nord12); animation: blink 1.4s infinite; }
        .badge-complete  { background: rgba(163,190,140,0.2);  color: var(--nord14); }
        .badge-error     { background: rgba(191,97,106,0.15);  color: var(--nord11); }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

        .action-btn {
            padding: 3px 11px; border-radius: 6px; font-family: inherit;
            font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid;
            transition: all 0.15s; text-decoration: none; display: inline-block;
        }
        .btn-download { background: rgba(163,190,140,0.15); border-color: rgba(163,190,140,0.5); color: var(--nord14); }
        .btn-download:hover { background: rgba(163,190,140,0.3); }
        .btn-delete   { background: rgba(191,97,106,0.1);  border-color: rgba(191,97,106,0.3);  color: var(--nord11); margin-left: 4px; }
        .btn-delete:hover { background: rgba(191,97,106,0.2); }
        .btn-edit     { background: rgba(129,161,193,0.1);  border-color: rgba(129,161,193,0.3);  color: var(--nord9); }
        .btn-edit:hover { background: rgba(129,161,193,0.2); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--nord1); border: 1px solid var(--nord3); border-radius: 12px; padding: 28px 32px; width: 380px; max-width: 95vw; }
        .modal-box h3 { margin: 0 0 20px; font-size: 1rem; color: var(--nord6); }
        .modal-row { margin-bottom: 14px; }
        .modal-row label { display: block; font-size: 0.78rem; color: var(--nord4); margin-bottom: 5px; }
        .modal-row input { width: 100%; box-sizing: border-box; background: var(--nord0); border: 1px solid var(--nord3); border-radius: 6px; color: var(--nord6); padding: 7px 10px; font-size: 0.88rem; font-family: inherit; }
        .modal-row input:focus { outline: none; border-color: var(--nord9); }
        .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
        .modal-save { background: var(--nord10); border: none; color: #fff; padding: 8px 20px; border-radius: 7px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
        .modal-save:hover { background: var(--nord9); }
        .modal-cancel { background: transparent; border: 1px solid var(--nord3); color: var(--text-muted); padding: 8px 16px; border-radius: 7px; font-size: 0.88rem; cursor: pointer; }
        .modal-cancel:hover { border-color: var(--nord4); color: var(--nord4); }

        .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.88rem; }
        .file-size { font-size: 0.78rem; color: var(--text-muted); }
        .notes-cell { font-size: 0.78rem; color: var(--text-muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Contract super-search */
        .search-wrap { position: relative; max-width: 480px; }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
            background: var(--nord6); border: 1px solid var(--border-color);
            border-radius: 8px; box-shadow: 0 4px 16px var(--shadow-color);
            max-height: 260px; overflow-y: auto; display: none; margin-top: 4px;
        }
        .search-dropdown.open { display: block; }
        .search-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--bg-secondary); transition: background 0.1s; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: var(--bg-secondary); }
        .search-code { font-weight: 700; color: var(--nord10); font-size: 0.8rem; margin-right: 8px; }
        .search-desc { font-size: 0.82rem; color: var(--text-muted); }

        .selected-contract {
            display: flex; align-items: center; gap: 10px; margin-top: 8px;
            padding: 8px 12px; background: var(--bg-secondary); border-radius: 8px;
        }
        .sel-code { font-weight: 700; color: var(--nord10); font-size: 0.85rem; }
        .sel-desc { font-size: 0.82rem; color: var(--text-muted); flex: 1; }
        .clear-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .clear-btn:hover { color: var(--nord11); }

        .load-spots-btn {
            background: var(--nord9); color: var(--nord6); border: none;
            border-radius: 8px; padding: 8px 20px; font-family: inherit;
            font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 14px;
        }
        .load-spots-btn:hover { background: var(--nord10); }
        .load-spots-btn:disabled { opacity: 0.5; cursor: default; }

        .schedule-all-btn {
            background: var(--nord14); color: var(--nord6); border: none;
            border-radius: 8px; padding: 8px 20px; font-family: inherit;
            font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .schedule-all-btn:hover { background: #8fad7a; }
        .schedule-all-btn:disabled { opacity: 0.5; cursor: default; }

        .spots-empty { text-align: center; padding: 28px 0; color: var(--text-muted); font-size: 0.88rem; }
        .isci-code { font-weight: 700; font-family: monospace; font-size: 0.85rem; }
        .capture-window { font-family: monospace; font-size: 0.76rem; color: var(--text-muted); }
    </style>
</head>
<body>

<!-- Edit capture modal -->
<div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-box">
        <h3>Edit Scheduled Capture</h3>
        <input type="hidden" id="editId">
        <div class="modal-row">
            <label>Start Time</label>
            <input type="datetime-local" id="editStartTime" step="1">
        </div>
        <div class="modal-row">
            <label>Duration (seconds)</label>
            <input type="number" id="editDuration" min="5" max="7200" step="1">
        </div>
        <div class="modal-row">
            <label>Notes</label>
            <input type="text" id="editNotes" maxlength="200">
        </div>
        <div id="editError" style="color:var(--nord11);font-size:0.8rem;margin-top:6px;display:none"></div>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="modal-save" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>


<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/" class="back-link">🏠</a>
            <div class="logo-icon">✅</div>
            <div>
                <h1>Control <span>Room</span></h1>
                <div class="logo-sub">Airchecks</div>
            </div>
        </div>
        <div class="agent-status">
            <div class="dot checking" id="agentDot"></div>
            <span id="agentLabel">Connecting to Datamover…</span>
            <span id="pollStatus" style="margin-left:10px; font-size:0.75rem; color:var(--text-muted);"></span>
            <button class="refresh-btn" id="pollBtn" onclick="triggerPoll()" style="margin-left:8px; color:var(--nord5); border-color:var(--nord3);" title="Trigger an immediate Etere poll">↻ Poll</button>
            <span id="deployHint" style="margin-left:8px; font-size:0.72rem; color:var(--nord3);" title="On the Datamover machine: git pull → copy datamover_agent\agent.py → C:\datamover_agent\ → nssm restart AirchecksAgentSvc">⬆ Deploy manually on Datamover</span>
        </div>
    </div>
</header>

<main>

    <!-- Schedule form -->
    <div class="card">
        <div class="card-title">Manually Schedule Aircheck</div>
        <div class="form-grid">

            <div class="field-row">
                <div class="field-group grow">
                    <label class="field-label">Client</label>
                    <input class="field-input" type="text" id="client" placeholder="e.g. McDonald's" />
                </div>
                <div class="field-group grow">
                    <label class="field-label">Notes (optional)</label>
                    <input class="field-input" type="text" id="notes" placeholder="Spot code, flight dates, etc." />
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Network</label>
                <div class="net-pills" id="netPills"></div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Capture</label>
                    <div class="when-toggle">
                        <button class="toggle-btn active" id="btnNow" onclick="setWhen('now')">Now</button>
                        <button class="toggle-btn" id="btnSched" onclick="setWhen('scheduled')">Scheduled</button>
                    </div>
                </div>
                <div class="field-group" id="schedField" style="display:none;">
                    <label class="field-label">Start Date &amp; Time</label>
                    <input class="field-input" type="datetime-local" id="startTime" step="1" />
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Duration</label>
                <div class="dur-row">
                    <button class="preset-btn" onclick="setDur(30)">30s</button>
                    <button class="preset-btn" onclick="setDur(60)">1 min</button>
                    <button class="preset-btn active" onclick="setDur(120)">2 min</button>
                    <button class="preset-btn" onclick="setDur(300)">5 min</button>
                    <span class="dur-sep">or</span>
                    <div class="dur-custom">
                        <input class="dur-input" type="number" id="durSeconds" value="120" min="5" max="7200" oninput="clearPresets()" />
                        <span class="dur-unit">seconds</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="submit-row" style="margin-top:16px;">
            <button class="submit-btn" id="submitBtn" onclick="scheduleCapture()">⏺ Start Capture</button>
            <span class="submit-msg" id="submitMsg"></span>
        </div>
    </div>

    <!-- Auto-schedule from Etere -->
    <div class="card">
        <div class="card-title">Auto-Schedule from Etere</div>

        <div class="field-group">
            <label class="field-label">Contract</label>
            <div class="search-wrap">
                <input class="field-input" type="text" id="etereSearch"
                       placeholder="Search by contract number or name…"
                       autocomplete="off" oninput="onEtereSearch()" style="width:100%;" />
                <div class="search-dropdown" id="etereDropdown"></div>
            </div>
            <div class="selected-contract" id="selectedContractBox" style="display:none;">
                <span class="sel-code" id="selCode"></span>
                <span class="sel-desc" id="selDesc"></span>
                <button class="clear-btn" onclick="clearContract()" title="Clear">✕</button>
            </div>
        </div>

        <button class="load-spots-btn" id="loadSpotsBtn" onclick="loadEtereSpots()" disabled>
            Load Spots from Etere
        </button>

        <div id="spotsArea" style="margin-top:16px;"></div>
    </div>

    <!-- OneDrive settings -->
    <div class="card" style="padding: 16px 20px;">
        <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
            <span style="font-size:0.72rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap;">OneDrive Retention</span>
            <input type="number" id="retentionInput" min="1" max="3650" class="field-input" style="width:80px;">
            <span style="font-size:0.85rem; color:var(--text-muted);">days</span>
            <button onclick="saveRetention()" style="background:var(--nord10); border:none; color:#fff; padding:6px 16px; border-radius:6px; font-size:0.82rem; font-weight:600; cursor:pointer; text-transform:uppercase; letter-spacing:0.04em;">Save</button>
            <span id="retentionStatus" style="font-size:0.8rem; color:var(--accent-success); display:none;">Saved</span>
            <a href="https://crossingstv0-my.sharepoint.com/personal/operations_crossingstv_com/_layouts/15/onedrive.aspx?id=%2Fpersonal%2Foperations_crossingstv_com%2FDocuments%2FAirchecks&viewid=b8deba9d-7406-4820-90c5-b0bc06d87483" target="_blank" style="font-size:0.82rem; color:var(--accent-primary); text-decoration:none; margin-left:auto; white-space:nowrap;">☁ Open OneDrive</a>
        </div>
    </div>

    <!-- Captures list -->
    <div class="card">
        <div class="captures-header">
            <div class="card-title" style="margin-bottom:0;">Recent Captures</div>
            <button class="refresh-btn" id="clearErrorsBtn" onclick="clearAllErrors()" style="display:none;color:var(--nord11);border-color:rgba(191,97,106,0.4);">✕ Clear Errors</button>
            <button class="refresh-btn" onclick="loadCaptures()">↻ Refresh</button>
        </div>
        <div id="selectToolbar" class="select-toolbar" style="display:none">
            <label><input type="checkbox" id="selectAllCb" onchange="toggleSelectAll(this)"> Select all scheduled</label>
            <button class="btn-delete-sel" id="deleteSelBtn" disabled onclick="deleteSelected()">Delete Selected (0)</button>
        </div>
        <div id="capturesBody"></div>
    </div>

</main>

<script>
const AGENT = 'http://100.102.206.113:8765';

const NETWORKS = [
    'NYC','WDC','CMP','HOU','SEA','SFO','CVC','LAX','DAL','MMT','SFO OTA','CVC OTA'
];

let selectedNetwork = null;
let whenMode = 'now';
let pollTimer = null;

// ── Build network pills ───────────────────────────────────────────────────────
const pillRow = document.getElementById('netPills');
NETWORKS.forEach(net => {
    const btn = document.createElement('button');
    btn.className = 'net-pill';
    btn.textContent = net;
    btn.addEventListener('click', () => {
        document.querySelectorAll('.net-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        selectedNetwork = net;
    });
    pillRow.appendChild(btn);
});

// ── When toggle ───────────────────────────────────────────────────────────────
function setWhen(mode) {
    whenMode = mode;
    document.getElementById('btnNow').classList.toggle('active', mode === 'now');
    document.getElementById('btnSched').classList.toggle('active', mode === 'scheduled');
    document.getElementById('schedField').style.display = mode === 'scheduled' ? 'flex' : 'none';
}

// ── Duration presets ──────────────────────────────────────────────────────────
function setDur(secs) {
    document.getElementById('durSeconds').value = secs;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}
function clearPresets() {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

// ── Agent health check ────────────────────────────────────────────────────────
function _fmtAgo(iso) {
    if (!iso) return null;
    const secs = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
    if (secs < 60)  return `${secs}s ago`;
    if (secs < 3600) return `${Math.round(secs/60)}m ago`;
    return `${Math.round(secs/3600)}h ago`;
}

function _renderPollStatus(poll) {
    const el = document.getElementById('pollStatus');
    if (!poll) { el.textContent = ''; return; }
    if (poll.last_error) {
        el.innerHTML = `<span style="color:var(--nord11);" title="${escHtml(poll.last_error)}">Poll failed ${_fmtAgo(poll.last_attempted) || ''}: ${escHtml(poll.last_error.slice(0,60))}${poll.last_error.length > 60 ? '…' : ''}</span>`;
    } else if (poll.last_succeeded) {
        el.textContent = `Polled ${_fmtAgo(poll.last_succeeded)} (${poll.candidate_count} candidate${poll.candidate_count !== 1 ? 's' : ''})`;
        el.style.color = 'var(--nord4)';
    } else if (poll.last_attempted) {
        el.textContent = `Poll pending…`;
        el.style.color = 'var(--nord4)';
    } else {
        el.textContent = 'Not yet polled';
        el.style.color = 'var(--nord4)';
    }
}

async function checkAgent() {
    const dot   = document.getElementById('agentDot');
    const label = document.getElementById('agentLabel');
    try {
        const r = await fetch(`${AGENT}/health`, { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
            const data = await r.json();
            dot.className = 'dot ok';
            label.textContent = 'Datamover connected';
            _renderPollStatus(data.poll || null);
        } else {
            throw new Error();
        }
    } catch {
        dot.className = 'dot err';
        label.textContent = 'Datamover unreachable';
        document.getElementById('pollStatus').textContent = '';
    }
}

async function triggerPoll() {
    const btn = document.getElementById('pollBtn');
    const el  = document.getElementById('pollStatus');
    btn.disabled = true;
    el.textContent = 'Polling…';
    el.style.color = 'var(--text-muted)';
    try {
        const r = await fetch('/api/airchecks/poll', { method: 'POST', signal: AbortSignal.timeout(20000) });
        const data = await r.json();
        if (!r.ok) {
            el.innerHTML = `<span style="color:var(--nord11);">${escHtml(data.detail || 'Poll failed')}</span>`;
        } else if (data.error) {
            el.innerHTML = `<span style="color:var(--nord11);" title="${escHtml(data.error)}">Poll error: ${escHtml(data.error.slice(0,80))}</span>`;
        } else {
            el.textContent = `Polled — ${data.polled} spot${data.polled !== 1 ? 's' : ''} checked, ${data.rescheduled} rescheduled`;
            el.style.color = data.rescheduled > 0 ? 'var(--nord13)' : 'var(--nord4)';
            if (data.rescheduled > 0) await loadCaptures();
        }
    } catch (e) {
        el.innerHTML = `<span style="color:var(--nord11);">Poll timed out — check agent logs</span>`;
    } finally {
        btn.disabled = false;
    }
}

// ── Schedule capture ──────────────────────────────────────────────────────────
async function scheduleCapture() {
    const client = document.getElementById('client').value.trim();
    const dur    = parseInt(document.getElementById('durSeconds').value);
    const notes  = document.getElementById('notes').value.trim();
    const msg    = document.getElementById('submitMsg');
    const btn    = document.getElementById('submitBtn');

    if (!client)          { flash(msg, 'Enter a client name.', false); return; }
    if (!selectedNetwork) { flash(msg, 'Select a network.', false); return; }
    if (!dur || dur < 5)  { flash(msg, 'Duration must be at least 5 seconds.', false); return; }

    let startTime = null;
    if (whenMode === 'scheduled') {
        const v = document.getElementById('startTime').value;
        if (!v) { flash(msg, 'Enter a scheduled start time.', false); return; }
        startTime = new Date(v).toISOString();
    }

    btn.disabled = true;
    btn.textContent = '…';

    try {
        const resp = await fetch(`${AGENT}/captures`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client,
                network:          selectedNetwork,
                duration_seconds: dur,
                start_time:       startTime,
                notes,
            }),
        });
        if (!resp.ok) {
            const e = await resp.json();
            throw new Error(e.detail || 'Request failed');
        }
        flash(msg, whenMode === 'scheduled' ? 'Capture scheduled.' : 'Capture started.', true);
        document.getElementById('client').value = '';
        document.getElementById('notes').value  = '';
        await loadCaptures();
        startPolling();
    } catch (e) {
        flash(msg, e.message, false);
    } finally {
        btn.disabled = false;
        btn.textContent = '⏺ Start Capture';
    }
}

function flash(el, text, ok) {
    el.textContent  = text;
    el.className    = 'submit-msg ' + (ok ? 'ok' : 'err');
    setTimeout(() => { el.textContent = ''; el.className = 'submit-msg'; }, 4000);
}

// ── Captures list ─────────────────────────────────────────────────────────────
async function loadCaptures() {
    try {
        const r = await fetch(`${AGENT}/captures`, { signal: AbortSignal.timeout(4000) });
        if (!r.ok) throw new Error();
        renderCaptures(await r.json());
    } catch {
        document.getElementById('capturesBody').innerHTML =
            '<div class="empty-state">Could not reach Datamover agent.</div>';
    }
}

function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function fmtDt(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) +
           ' ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

function fmtDur(secs) {
    if (secs < 60) return `${secs}s`;
    const m = Math.floor(secs / 60), s = secs % 60;
    return s ? `${m}m ${s}s` : `${m}m`;
}

function statusBadge(s) {
    const map = {
        pending:   ['badge-pending',   'Pending'],
        scheduled: ['badge-scheduled', 'Scheduled'],
        recording: ['badge-recording', '● Recording'],
        complete:  ['badge-complete',  '✓ Complete'],
        error:     ['badge-error',     '✗ Error'],
    };
    const [cls, label] = map[s] || ['badge-pending', s];
    return `<span class="badge ${cls}">${label}</span>`;
}

let captureIndex = {};
let _lastList    = [];
let _sortKey     = 'start_time';
let _sortDir     = 1;

function sortCaptures(key) {
    if (_sortKey === key) { _sortDir *= -1; } else { _sortKey = key; _sortDir = 1; }
    renderCaptures(_lastList);
}

function _sortVal(cap, key) {
    switch (key) {
        case 'client':   return (cap.client   || '').toLowerCase();
        case 'network':  return (cap.network  || '').toLowerCase();
        case 'start_time': return cap.start_time || '';
        case 'duration': return cap.duration_seconds || 0;
        case 'status':   return cap.status || '';
        case 'size':     return cap.size_bytes || 0;
        case 'isci':     return (cap.isci_code || '').toLowerCase();
        case 'notes':    return (cap.notes || '').toLowerCase();
        default:         return '';
    }
}

function _th(label, key) {
    const active = _sortKey === key;
    const arrow  = active ? (_sortDir === 1 ? ' ↑' : ' ↓') : '';
    const style  = `cursor:pointer;user-select:none;${active ? 'color:var(--nord8)' : ''}`;
    return `<th onclick="sortCaptures('${key}')" style="${style}">${label}${arrow}</th>`;
}

function renderCaptures(list) {
    _lastList    = list;
    captureIndex = Object.fromEntries(list.map(c => [c.id, c]));
    const body   = document.getElementById('capturesBody');
    if (!list.length) {
        body.innerHTML = '<div class="empty-state">No captures yet.</div>';
        return;
    }

    const sorted = [...list].sort((a, b) => {
        const av = _sortVal(a, _sortKey), bv = _sortVal(b, _sortKey);
        return av < bv ? -_sortDir : av > bv ? _sortDir : 0;
    });

    const hasErrors   = list.some(c => c.status === 'error');
    document.getElementById('clearErrorsBtn').style.display = hasErrors ? '' : 'none';
    const hasScheduled = list.some(c => c.status === 'scheduled' || c.status === 'pending');
    document.getElementById('selectToolbar').style.display = hasScheduled ? 'flex' : 'none';
    document.getElementById('selectAllCb').checked = false;
    document.getElementById('deleteSelBtn').disabled = true;
    document.getElementById('deleteSelBtn').textContent = 'Delete Selected (0)';

    let html = `<table>
        <thead><tr>
            <th class="cb-col"></th>
            ${_th('Client','client')}${_th('Network','network')}${_th('Start Time','start_time')}
            ${_th('Duration','duration')}${_th('Status','status')}${_th('Size','size')}
            ${_th('ISCI','isci')}${_th('Notes','notes')}<th></th>
        </tr></thead><tbody>`;

    sorted.forEach(cap => {
        const actions = cap.status === 'complete'
            ? `<a class="action-btn btn-download" href="${AGENT}/captures/${cap.id}/download">↓ Download</a>
               <button class="action-btn btn-delete" onclick="deleteCapture('${cap.id}')">✕</button>`
            : cap.status === 'error'
            ? `<button class="action-btn btn-delete" onclick="deleteCapture('${cap.id}')">✕ Remove</button>`
            : (cap.status === 'scheduled' || cap.status === 'pending')
            ? `<button class="action-btn btn-edit" onclick="openEditModal('${cap.id}')">✎ Edit</button>
               <button class="action-btn btn-delete" onclick="deleteCapture('${cap.id}')">✕</button>`
            : '';

        const isSchedulable = cap.status === 'scheduled' || cap.status === 'pending';
        const cbCell = isSchedulable
            ? `<td class="cb-col"><input type="checkbox" class="cap-cb" data-id="${cap.id}" onchange="updateDeleteBtn()"></td>`
            : `<td class="cb-col"></td>`;

        html += `<tr>
            ${cbCell}
            <td><strong>${escHtml(cap.client)}</strong></td>
            <td>${escHtml(cap.network)}</td>
            <td>${fmtDt(cap.start_time)}</td>
            <td>${fmtDur(cap.duration_seconds)}</td>
            <td>${statusBadge(cap.status)}</td>
            <td class="file-size">${fmtSize(cap.size_bytes)}</td>
            <td class="notes-cell" style="font-family:monospace;font-size:0.78rem">${escHtml(cap.isci_code || '—')}</td>
            <td class="notes-cell" title="${escHtml(cap.notes)}">${escHtml(cap.notes)}</td>
            <td style="white-space:nowrap">${actions}</td>
        </tr>`;

        if (cap.status === 'error' && cap.error) {
            html += `<tr>
                <td colspan="9" style="font-size:0.76rem;color:var(--nord11);padding:4px 12px 8px;">
                    ${escHtml(cap.error.slice(0, 200))}
                </td></tr>`;
        }
    });

    html += '</tbody></table>';
    body.innerHTML = html;
}

async function clearAllErrors() {
    const ids = Object.values(captureIndex).filter(c => c.status === 'error').map(c => c.id);
    if (!ids.length) return;
    if (!confirm(`Remove ${ids.length} error capture${ids.length > 1 ? 's' : ''}?`)) return;
    await Promise.all(ids.map(id => fetch(`${AGENT}/captures/${id}`, { method: 'DELETE' }).catch(() => {})));
    await loadCaptures();
}

function toggleSelectAll(cb) {
    document.querySelectorAll('.cap-cb').forEach(el => el.checked = cb.checked);
    updateDeleteBtn();
}

function updateDeleteBtn() {
    const checked = document.querySelectorAll('.cap-cb:checked');
    const btn = document.getElementById('deleteSelBtn');
    btn.disabled = checked.length === 0;
    btn.textContent = `Delete Selected (${checked.length})`;
    document.getElementById('selectAllCb').checked =
        checked.length > 0 && checked.length === document.querySelectorAll('.cap-cb').length;
}

async function deleteSelected() {
    const ids = [...document.querySelectorAll('.cap-cb:checked')].map(el => el.dataset.id);
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} scheduled capture${ids.length > 1 ? 's' : ''}?`)) return;
    await Promise.all(ids.map(id => fetch(`${AGENT}/captures/${id}`, { method: 'DELETE' }).catch(() => {})));
    await loadCaptures();
}

async function deleteCapture(id) {
    if (!confirm('Delete this capture and its file?')) return;
    try {
        await fetch(`${AGENT}/captures/${id}`, { method: 'DELETE' });
        await loadCaptures();
    } catch { alert('Delete failed.'); }
}

function openEditModal(id) {
    const cap = captureIndex[id];
    if (!cap) return;
    document.getElementById('editId').value = id;
    // datetime-local expects "YYYY-MM-DDTHH:MM"
    const dt = new Date(cap.start_time);
    const pad = n => String(n).padStart(2, '0');
    const local = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    document.getElementById('editStartTime').value = local;
    document.getElementById('editDuration').value  = cap.duration_seconds;
    document.getElementById('editNotes').value     = cap.notes || '';
    document.getElementById('editError').style.display = 'none';
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
    const id  = document.getElementById('editId').value;
    const st  = document.getElementById('editStartTime').value;
    const dur = parseInt(document.getElementById('editDuration').value, 10);
    const notes = document.getElementById('editNotes').value.trim();
    const errEl = document.getElementById('editError');
    errEl.style.display = 'none';

    const body = {};
    if (st)        body.start_time        = new Date(st).toISOString().slice(0, 19);
    if (!isNaN(dur)) body.duration_seconds = dur;
    body.notes = notes;

    try {
        const r = await fetch(`${AGENT}/captures/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            errEl.textContent = d.detail || `Error ${r.status}`;
            errEl.style.display = 'block';
            return;
        }
        closeEditModal();
        await loadCaptures();
    } catch (e) {
        errEl.textContent = 'Could not reach Datamover.';
        errEl.style.display = 'block';
    }
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auto-poll while active captures exist ────────────────────────────────────
async function pollIfNeeded() {
    try {
        const r = await fetch(`${AGENT}/captures`, { signal: AbortSignal.timeout(4000) });
        if (!r.ok) return;
        const list = await r.json();
        renderCaptures(list);
        const hasActive = list.some(c => ['pending','scheduled','recording'].includes(c.status));
        if (!hasActive) stopPolling();
    } catch {
        stopPolling();
    }
}

function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(pollIfNeeded, 5000);
}

function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Etere auto-schedule ───────────────────────────────────────────────────────
let selectedContract = null;
let etereSpots       = [];
let etereSearchTimer = null;

function onEtereSearch() {
    clearTimeout(etereSearchTimer);
    const q = document.getElementById('etereSearch').value.trim();
    if (q.length < 2) { closeEtereDropdown(); return; }
    etereSearchTimer = setTimeout(() => doEtereSearch(q), 300);
}

async function doEtereSearch(q) {
    try {
        const r    = await fetch(`/api/traffic/contract-search?q=${encodeURIComponent(q)}`);
        const list = await r.json();
        const dd   = document.getElementById('etereDropdown');
        if (!list.length) { closeEtereDropdown(); return; }
        dd.innerHTML = list.map(c => `
            <div class="search-item">
                <span class="search-code">${escHtml(c.code)}</span>
                <span class="search-desc">${escHtml(c.description)}</span>
            </div>`).join('');
        dd.querySelectorAll('.search-item').forEach((el, i) => {
            el.addEventListener('click', () => {
                selectContract(list[i].id, list[i].code, list[i].description);
            });
        });
        dd.classList.add('open');
    } catch { closeEtereDropdown(); }
}

function closeEtereDropdown() {
    document.getElementById('etereDropdown').classList.remove('open');
}

function selectContract(id, code, desc) {
    selectedContract = { id, code, desc };
    document.getElementById('etereSearch').value = '';
    closeEtereDropdown();
    document.getElementById('selectedContractBox').style.display = 'flex';
    document.getElementById('selCode').textContent = code;
    document.getElementById('selDesc').textContent = desc;
    document.getElementById('loadSpotsBtn').disabled = false;
    document.getElementById('spotsArea').innerHTML = '';
    etereSpots = [];
}

function clearContract() {
    selectedContract = null;
    etereSpots = [];
    document.getElementById('etereSearch').value = '';
    document.getElementById('selectedContractBox').style.display = 'none';
    document.getElementById('loadSpotsBtn').disabled = true;
    document.getElementById('spotsArea').innerHTML = '';
}

async function loadEtereSpots() {
    if (!selectedContract) return;
    const btn = document.getElementById('loadSpotsBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    document.getElementById('spotsArea').innerHTML = '';

    try {
        const r = await fetch(`/api/airchecks/etere-spots?contract_id=${selectedContract.id}`);
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Query failed'); }
        etereSpots = await r.json();
        renderSpots();
    } catch (e) {
        document.getElementById('spotsArea').innerHTML =
            `<div class="spots-empty" style="color:var(--nord11);">Error: ${escHtml(e.message)}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Load Spots from Etere';
    }
}

function fmtAirDt(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
           ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
}

function renderSpots() {
    const area = document.getElementById('spotsArea');
    if (!etereSpots.length) {
        area.innerHTML = '<div class="spots-empty">No upcoming scheduled spots found for this contract.</div>';
        return;
    }

    let html = `<table>
        <thead><tr>
            <th>ISCI Code</th><th>Network</th><th>Earliest Air</th>
            <th>Spot</th><th>Capture Window</th>
        </tr></thead><tbody>`;

    etereSpots.forEach(s => {
        const start  = new Date(s.capture_start);
        const end    = new Date(start.getTime() + s.capture_duration_seconds * 1000);
        const tFmt   = { hour: 'numeric', minute: '2-digit', second: '2-digit' };
        const window = `${start.toLocaleTimeString('en-US', tFmt)} – ${end.toLocaleTimeString('en-US', tFmt)}`;
        html += `<tr>
            <td><span class="isci-code">${escHtml(s.isci_code)}</span></td>
            <td>${escHtml(s.network)}</td>
            <td>${escHtml(s.air_datetime_local)}</td>
            <td style="font-family:monospace;">:${String(s.duration_seconds).padStart(2,'0')}</td>
            <td class="capture-window">${window}</td>
        </tr>`;
    });

    html += `</tbody></table>
        <div style="display:flex;align-items:center;gap:14px;margin-top:14px;">
            <button class="schedule-all-btn" id="schedAllBtn" onclick="scheduleAllSpots()">
                ⏺ Schedule All ${etereSpots.length} Aircheck${etereSpots.length !== 1 ? 's' : ''}
            </button>
            <span class="submit-msg" id="schedAllMsg"></span>
        </div>`;

    area.innerHTML = html;
}

async function scheduleAllSpots() {
    if (!etereSpots.length || !selectedContract) return;
    const btn = document.getElementById('schedAllBtn');
    const msg = document.getElementById('schedAllMsg');
    btn.disabled = true;

    let ok = 0, fail = 0;
    for (const s of etereSpots) {
        btn.textContent = `Scheduling ${ok + fail + 1} of ${etereSpots.length}…`;
        try {
            const resp = await fetch(`${AGENT}/captures`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    client:           s.client_name || s.isci_code,
                    network:          s.network,
                    duration_seconds: s.capture_duration_seconds,
                    start_time:       s.capture_start,
                    notes:            s.customer_ref || selectedContract.code,
                    isci_code:        s.isci_code,
                    original_ora:     s.air_ora,
                }),
            });
            if (resp.ok) { ok++; } else { fail++; }
        } catch { fail++; }
    }

    btn.textContent = `⏺ Schedule All ${etereSpots.length} Aircheck${etereSpots.length !== 1 ? 's' : ''}`;
    btn.disabled = false;

    if (!fail) {
        flash(msg, `✓ ${ok} airchecks scheduled.`, true);
        await loadCaptures();
        startPolling();
    } else {
        flash(msg, `${ok} scheduled, ${fail} failed — check Datamover connection.`, false);
    }
}

// Close dropdown on outside click
document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeEtereDropdown();
});

// ── Init ──────────────────────────────────────────────────────────────────────
checkAgent();
loadCaptures().then(() => {
    const capturesBody = document.getElementById('capturesBody');
    if (capturesBody.querySelector('.badge-recording, .badge-scheduled, .badge-pending')) {
        startPolling();
    }

    // Auto-select contract from ?contract_id= URL param (e.g. redirected from traffic assign)
    const _urlCid = new URLSearchParams(window.location.search).get('contract_id');
    if (_urlCid) {
        fetch(`/api/traffic/contract-search?q=${encodeURIComponent(_urlCid)}`)
            .then(r => r.json())
            .then(list => {
                const c = list.find(x => String(x.id) === _urlCid) || list[0];
                if (c) {
                    selectContract(c.id, c.code, c.description);
                    loadEtereSpots();
                }
            })
            .catch(() => {});
    }
    // Load retention setting
    fetch('/api/airchecks/settings').then(r => r.json()).then(d => {
        document.getElementById('retentionInput').value = d.onedrive_retention_days ?? 90;
    }).catch(() => {
        document.getElementById('retentionInput').value = 90;
    });
});


async function saveRetention() {
    const days = parseInt(document.getElementById('retentionInput').value);
    if (!days || days < 1) return;
    const r = await fetch('/api/airchecks/settings', {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({onedrive_retention_days: days}),
    });
    if (r.ok) {
        const el = document.getElementById('retentionStatus');
        el.style.display = 'inline';
        setTimeout(() => el.style.display = 'none', 2000);
    }
}
