<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP Multiviewer — Control Room</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/_variables.css" />
    <link rel="stylesheet" href="/static/css/portal.css" />
    <style>
        html, body { height: 100%; }
        body { margin: 0; display: flex; flex-direction: column; }
        main.mv-main { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .mv-toolbar {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; background: var(--nord1, #3b4252);
            border-bottom: 1px solid var(--border-color, #434c5e);
        }
        .mv-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; border: 1px solid var(--border-color, #434c5e);
            border-radius: 8px; background: var(--nord2, #434c5e);
            color: var(--nord4, #d8dee9); font-family: 'Inter', sans-serif;
            font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .mv-btn:hover { border-color: var(--nord10, #5e81ac); }
        .mv-btn.active { background: var(--nord10, #5e81ac); color: #fff; border-color: var(--nord10, #5e81ac); }
        .mv-hint { font-size: 0.76rem; color: var(--nord4, #d8dee9); opacity: 0.8; }
        .mv-open { margin-left: auto; font-size: 0.78rem; color: var(--nord8, #88c0d0); text-decoration: none; }
        .mv-open:hover { text-decoration: underline; }

        .mv-frame { flex: 1; width: 100%; border: 0; min-height: 0; background: #000; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <a href="/" class="home-btn">🏠</a>
            <div class="logo-icon">🖥️</div>
            <div>
                <h1>IP <span>Multiviewer</span></h1>
                <div class="logo-sub">Control Room</div>
            </div>
        </div>
        <span class="header-badge">Live Monitoring</span>
    </div>
</header>

<main class="mv-main">
    <div class="mv-toolbar">
        <button id="mvRealtime" class="mv-btn active">▶ Realtime — video &amp; audio</button>
        <button id="mvFull" class="mv-btn">⚙ Full viewer (Config / Monitor)</button>
        <span class="mv-hint" id="mvHint">Live realtime grid — click a network to hear its audio.</span>
        <a class="mv-open" id="mvOpen" href="http://34.208.18.64/files/watch.html#stream=REALTIME" target="_blank" rel="noopener">Open in new tab ↗</a>
    </div>
    <iframe id="mvFrame" class="mv-frame"
            src="http://34.208.18.64/files/watch.html#stream=REALTIME"
            allow="autoplay; fullscreen"></iframe>
</main>

<script>
    // The live realtime stream authenticates properly (MSE fetch) and works in
    // all browsers. The vendor's thumbnail *previews* only authenticate on
    // Firefox (plain <img> elsewhere → 401), so realtime is the default view.
    var REALTIME = "http://34.208.18.64/files/watch.html#stream=REALTIME";
    var FULL     = "http://34.208.18.64/files/index.html";
    var frame  = document.getElementById("mvFrame");
    var btnR   = document.getElementById("mvRealtime");
    var btnF   = document.getElementById("mvFull");
    var hint   = document.getElementById("mvHint");
    var open   = document.getElementById("mvOpen");

    function show(mode) {
        var full = mode === "full";
        frame.src = full ? FULL : REALTIME;   // reload the frame at the chosen view
        open.href = frame.src;
        btnF.classList.toggle("active", full);
        btnR.classList.toggle("active", !full);
        hint.textContent = full
            ? "Full vendor viewer — Config, Monitor, and previews. Thumbnail previews render only in Firefox."
            : "Live realtime grid — click a network to hear its audio.";
    }

    btnR.addEventListener("click", function () { show("realtime"); });
    btnF.addEventListener("click", function () { show("full"); });
</script>

</body>
</html>
